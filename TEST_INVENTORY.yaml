# TEST_INVENTORY.yaml — P1 Naming Authority
# Maps every FR to expected test function names. These are the AUTHORITATIVE names
# that derive_test_cases.md preserves in TEST_SPEC.md (P2 single source of truth).
# Specified per FR and per test category (unit/integration/cross_cutting).
# If no name is specified for a category, derive_test_cases.md fills the gap with
# names derived via the 7-Question Protocol.
# Source of Truth: SPEC.md (project root) — INGESTION MODE.
format_version: "1.1"

fr_tests:
  FR-01:
    # Task submission and validation (submit command rules table)
    unit:
      - test_fr01_submit_rejects_empty_command
      - test_fr01_submit_rejects_whitespace_only_command
      - test_fr01_submit_rejects_command_over_1000_chars
      - test_fr01_submit_rejects_injection_chars_table
      - test_fr01_submit_rejects_duplicate_name_against_pending
      - test_fr01_submit_rejects_duplicate_name_against_running
      - test_fr01_submit_accepts_valid_command_generates_uuid8
      - test_fr01_submit_writes_task_atomically
      - test_fr01_submit_exit_code_2_on_validation_failure
    integration:
      - test_fr01_submit_e2e_returns_id_and_json_shape_with_flag

  FR-02:
    # Task executor (subprocess, state machine, --all concurrency)
    unit:
      - test_fr02_done_state_on_exit_zero
      - test_fr02_failed_state_on_nonzero_exit
      - test_fr02_timeout_state_on_TimeoutExpired
      - test_fr02_records_stdout_tail_last_2000_chars
      - test_fr02_records_stderr_tail_last_2000_chars
      - test_fr02_records_duration_ms
      - test_fr02_records_finished_at
      - test_fr02_single_task_timeout_returns_exit_4
    integration:
      - test_fr02_run_all_uses_thread_pool_max_workers
      - test_fr02_concurrent_writes_preserve_tasks_json_integrity
      - test_fr02_subprocess_called_without_shell_true

  FR-03:
    # Retry + circuit breaker
    unit:
      - test_fr03_retry_up_to_retry_limit_on_failed
      - test_fr03_retry_up_to_retry_limit_on_timeout
      - test_fr03_backoff_uses_exponential_formula
      - test_fr03_backoff_sleep_is_injectable_for_tests
      - test_fr03_breaker_opens_after_threshold_consecutive_final_failures
      - test_fr03_breaker_open_period_run_exits_3_no_subprocess
      - test_fr03_breaker_transitions_to_half_open_after_cooldown
      - test_fr03_breaker_half_open_success_closes_and_zeroes_counter
      - test_fr03_breaker_half_open_failure_reopens
      - test_fr03_breaker_persists_to_breaker_json_atomically
    integration:
      - test_fr03_e2e_three_failures_then_run_exits_3
      - test_fr03_e2e_breaker_recovery_within_cooldown_plus_one_second

  FR-04:
    # Result TTL cache
    unit:
      - test_fr04_signature_is_sha256_of_command
      - test_fr04_cached_replay_within_ttl_skips_subprocess
      - test_fr04_cached_replay_marks_task_cached_true
      - test_fr04_cache_miss_executes_subprocess
      - test_fr04_cache_expired_executes_subprocess
      - test_fr04_cache_writes_on_done_atomically
      - test_fr04_cache_read_write_thread_safe_with_fr02
    integration:
      - test_fr04_e2e_repeated_command_replays_from_cache

  FR-05:
    # CLI integration (subcommands, --json, exit codes)
    unit:
      - test_fr05_exit_code_0_success
      - test_fr05_exit_code_2_validation_error
      - test_fr05_exit_code_2_unknown_task_id
      - test_fr05_exit_code_3_breaker_open
      - test_fr05_exit_code_4_task_timeout
      - test_fr05_exit_code_1_other_internal_error
      - test_fr05_json_flag_emits_single_line_json
      - test_fr05_clear_removes_all_data_files
      - test_fr05_list_filters_by_status_flag
      - test_fr05_status_outputs_full_task_fields
    integration:
      - test_fr05_e2e_full_lifecycle_submit_run_status
      - test_fr05_e2e_clear_then_run_unknown_id_exits_2

nfr_tests:
  NFR-01:
    # Performance: submit+status p95 < 50ms (100 iter, no subprocess)
    benchmark:
      - test_nfr01_submit_status_p95_under_50ms_100_iter
  NFR-02:
    # Security: shell=True forbidden codebase-wide; injection-char blacklist tested
    audit:
      - test_nfr02_no_shell_true_in_codebase
    unit:
      - test_nfr02_injection_char_blacklist_covered_in_fr01_tests
  NFR-03:
    # Reliability: atomic write + JSON-after-interrupt + breaker recovery
    unit:
      - test_nfr03_atomic_write_uses_tmp_then_os_replace
      - test_nfr03_tasks_json_valid_after_simulated_interrupt
      - test_nfr03_breaker_json_valid_after_simulated_interrupt
      - test_nfr03_cache_json_valid_after_simulated_interrupt
      - test_nfr03_breaker_open_to_closed_recovery_under_cooldown_plus_one_second
    integration:
      - test_nfr03_run_all_after_interrupt_no_task_lost
  NFR-04:
    # Security: secret redaction in stdout_tail/stderr_tail
    unit:
      - test_nfr04_redacts_sk_prefix_lines_with_8_plus_alnum
      - test_nfr04_redacts_token_equals_lines
      - test_nfr04_redaction_replaces_whole_line_with_REDACTED
      - test_nfr04_no_redaction_on_clean_output
      - test_nfr04_redaction_applied_before_persist
  NFR-05:
    # Maintainability: docstring + [FR-XX] reference
    lint:
      - test_nfr05_all_public_functions_have_docstrings
      - test_nfr05_docstrings_contain_fr_xx_references
  NFR-06:
    # Deployability: TASKQ_* env vars + .env.example (8 entries)
    unit:
      - test_nfr06_config_reads_all_eight_taskq_env_vars
      - test_nfr06_config_defaults_match_spec_section_5_1
      - test_nfr06_env_example_declares_all_eight_vars_with_comments

cross_cutting:
  security:
    - test_nfr02_no_shell_true_in_codebase
    - test_nfr04_redacts_sk_prefix_lines_with_8_plus_alnum
    - test_nfr04_redacts_token_equals_lines
  performance:
    - test_nfr01_submit_status_p95_under_50ms_100_iter
  reliability:
    - test_nfr03_atomic_write_uses_tmp_then_os_replace
    - test_nfr03_tasks_json_valid_after_simulated_interrupt
    - test_nfr03_breaker_open_to_closed_recovery_under_cooldown_plus_one_second
  maintainability:
    - test_nfr05_all_public_functions_have_docstrings
    - test_nfr05_docstrings_contain_fr_xx_references
  deployment:
    - test_nfr06_env_example_declares_all_eight_vars_with_comments
