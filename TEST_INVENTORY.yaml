# TEST_INVENTORY.yaml — P1 Test Naming Authority
# Single source of truth for test function names. Preserved verbatim by
# derive_test_cases.md into 02-architecture/TEST_SPEC.md (P2).
# Naming convention (per CLAUDE.md D4 + matrix §4.4): JS uses
# `it('test_frNN_xxx')` / Python uses `def test_frNN_xxx`.
# AC-field schema follows canonical SRS.md §3 / Matrix §2.1 hyphen-style
# (e.g. AC-FR01-01, AC-FR02-03, AC-NFR03-02) — 1:1 with upstream.
# 1:1 mapping with TRACEABILITY_MATRIX.md §2 forward trace:
#   * Every AC row in §2.1..§2.6 ⇒ one tc_id entry below.
#   * Parametrized ranges (e.g. 7 injection chars under AC-FR01-03) are
#     EXPANDED into independent tc_ids (TC-FR01-03a..TC-FR01-03g).
#   * Cross-cuts are signalled via cross_ref_frs / cross_ref_nfrs metadata,
#     NOT by collapsing or omitting entries.
test_inventory:
  format_version: "1.2"
  project: "taskq"
  source_spec: "SPEC.md v2.0.0 (2026-06-15)"
  source_requirements: "01-requirements/SRS.md v1.0 (APPROVED 2026-06-28)"
  source_matrix: "01-requirements/TRACEABILITY_MATRIX.md §2 (forward trace)"
  naming_convention: "test_frNN_xxx (Python def) / it('test_frNN_xxx') (JS)"
  derivation_date: "2026-07-01"
  derivation_phase: "P1 — Requirements (round 2 — B-2 fix-ups)"

  # -------------------------------------------------------------------------
  # FR-01 — Task Model & Persistence (taskq.store + taskq.cli.submit)
  # Matrix §2.1 rows: AC-FR01-01..08 (canonical = 8 ACs).
  # Injection-character AC-FR01-03 expanded into 7 sub-cases (TC-FR01-03a..g).
  # FR-01 enumerated tc_id count = 15 (1+1+1+7+1+1+1+1+1).
  # -------------------------------------------------------------------------
  fr01:
    title: "任務模型與持久化 (Task Model & Persistence)"
    srs_section: "SRS.md §3.1"
    spec_section: "SPEC.md §3 FR-01"
    owning_module: "taskq.store + taskq.cli.submit"
    tests:
      - tc_id: TC-FR01-01
        ac: AC-FR01-01
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_submit_empty
        layer: unit
        type: cli_validator
        asserts:
          - "exit_code == 2"
          - "stderr non-empty (validation message)"
          - "tasks.json unchanged (no write)"
      - tc_id: TC-FR01-01b
        ac: AC-FR01-01
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_submit_whitespace
        layer: unit
        type: cli_validator
        asserts:
          - "exit_code == 2"
          - "stderr non-empty"
          - "tasks.json unchanged"
      - tc_id: TC-FR01-02b
        ac: AC-FR01-02
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_submit_length_boundary
        layer: unit
        type: cli_validator
        asserts:
          - "command length == 1000 chars → exit_code == 0 (accepted at boundary)"
          - "command length == 1001 chars → exit_code == 2 (rejected past boundary)"
          - "tasks.json unchanged on rejection"
      - tc_id: TC-FR01-03a
        ac: AC-FR01-03
        cross_ref_nfrs: [AC-NFR02-02]
        cross_ref_constraints: [C-06]
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_submit_injection_semicolon
        layer: unit
        type: cli_validator_injection
        injection_char: ";"
        asserts:
          - "exit_code == 2"
          - "tasks.json unchanged"
      - tc_id: TC-FR01-03b
        ac: AC-FR01-03
        cross_ref_nfrs: [AC-NFR02-02]
        cross_ref_constraints: [C-06]
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_submit_injection_pipe
        layer: unit
        type: cli_validator_injection
        injection_char: "|"
        asserts:
          - "exit_code == 2"
          - "tasks.json unchanged"
      - tc_id: TC-FR01-03c
        ac: AC-FR01-03
        cross_ref_nfrs: [AC-NFR02-02]
        cross_ref_constraints: [C-06]
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_submit_injection_amp
        layer: unit
        type: cli_validator_injection
        injection_char: "&"
        asserts:
          - "exit_code == 2"
          - "tasks.json unchanged"
      - tc_id: TC-FR01-03d
        ac: AC-FR01-03
        cross_ref_nfrs: [AC-NFR02-02]
        cross_ref_constraints: [C-06]
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_submit_injection_dollar
        layer: unit
        type: cli_validator_injection
        injection_char: "$"
        asserts:
          - "exit_code == 2"
          - "tasks.json unchanged"
      - tc_id: TC-FR01-03e
        ac: AC-FR01-03
        cross_ref_nfrs: [AC-NFR02-02]
        cross_ref_constraints: [C-06]
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_submit_injection_gt
        layer: unit
        type: cli_validator_injection
        injection_char: ">"
        asserts:
          - "exit_code == 2"
          - "tasks.json unchanged"
      - tc_id: TC-FR01-03f
        ac: AC-FR01-03
        cross_ref_nfrs: [AC-NFR02-02]
        cross_ref_constraints: [C-06]
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_submit_injection_lt
        layer: unit
        type: cli_validator_injection
        injection_char: "<"
        asserts:
          - "exit_code == 2"
          - "tasks.json unchanged"
      - tc_id: TC-FR01-03g
        ac: AC-FR01-03
        cross_ref_nfrs: [AC-NFR02-02]
        cross_ref_constraints: [C-06]
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_submit_injection_backtick
        layer: unit
        type: cli_validator_injection
        injection_char: "`"
        asserts:
          - "exit_code == 2"
          - "tasks.json unchanged"
      - tc_id: TC-FR01-04
        ac: AC-FR01-04
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_submit_valid
        layer: integration
        type: cli_store_write
        asserts:
          - "exit_code == 0"
          - "tasks.json exists and parses as valid JSON"
          - "exactly one task record present"
          - "task.id format == [0-9a-f]{8} (uuid4 prefix, 8 hex chars)"
          - "task.status == 'pending'"
          - "task.command matches submitted command"
          - "task.created_at is ISO 8601 timestamp"
      - tc_id: TC-FR01-05
        ac: AC-FR01-05
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_pending_state_record
        layer: integration
        type: cli_store_write
        asserts:
          - "task record carries status='pending', command, created_at fields verbatim from canonical"
      - tc_id: TC-FR01-06
        ac: AC-FR01-06
        cross_ref_constraints: [C-03, C-07]
        cross_ref_risks: [R1]
        cross_ref_nfrs: [AC-NFR03-01]
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_atomic_write
        layer: integration
        type: atomic_write
        asserts:
          - "write uses tmp + os.replace mechanism (canonical verbatim)"
          - "no partial / truncated writes observed under crash-injection"
      - tc_id: TC-FR01-07
        ac: AC-FR01-07
        cross_ref_constraints: [C-07]
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_corrupt_store_exit1
        layer: integration
        type: store_load_failure
        asserts:
          - "exit_code == 1"
          - "stderr contains literal 'store corrupted'"
          - "tasks.json NOT silently rebuilt on disk"
      - tc_id: TC-FR01-08
        ac: AC-FR01-08
        cross_ref_nfrs: [AC-NFR03-01]
        cross_ref_constraints: [C-03]
        test_file: tests/test_fr01_submit.py
        test_function: test_fr01_no_write_on_reject
        layer: integration
        type: no_write_on_reject
        asserts:
          - "storage byte-for-byte unchanged after any validation-rule rejection"
          - "mtime / size of tasks.json unchanged when submit rejected"

  # -------------------------------------------------------------------------
  # FR-02 — Task Execution & Retry (taskq.executor — High-Risk Module)
  # Matrix §2.2 rows: AC-FR02-01..06 (canonical = 6 ACs).
  # FR-02 enumerated tc_id count = 6 (1 per AC).
  # -------------------------------------------------------------------------
  fr02:
    title: "任務執行與重試 (Task Execution & Retry)"
    srs_section: "SRS.md §3.2"
    spec_section: "SPEC.md §3 FR-02"
    owning_module: "taskq.executor (high-risk)"
    tests:
      - tc_id: TC-FR02-01
        ac: AC-FR02-01
        cross_ref_nfrs: [AC-NFR02-01]
        cross_ref_constraints: [C-02]
        test_file: tests/test_fr02_run.py
        test_function: test_fr02_subprocess_invocation
        layer: integration
        type: executor_invocation
        asserts:
          - "subprocess invocation uses subprocess.run(shlex.split(command), capture_output=True, text=True, timeout=TASKQ_TASK_TIMEOUT) — canonical verbatim"
          - "any path in source uses shell=True → 0 occurrences (cross-cut with NFR-02.AC1)"
          - "executor_success path: task.status == 'done', task.exit_code == 0"
      - tc_id: TC-FR02-02
        ac: AC-FR02-02
        test_file: tests/test_fr02_run.py
        test_function: test_fr02_state_machine
        layer: integration
        type: executor_state_transitions
        asserts:
          - "state transitions pending → running → done | failed | timeout"
          - "exit 0 → done; non-zero → failed; TimeoutExpired → timeout (canonical mapping verbatim)"
      - tc_id: TC-FR02-03
        ac: AC-FR02-03
        test_file: tests/test_fr02_run.py
        test_function: test_fr02_result_fields
        layer: integration
        type: executor_output_capture
        asserts:
          - "result carries exit_code, stdout_tail (last 2000 chars), stderr_tail (last 2000 chars), duration_ms, finished_at (canonical field set verbatim)"
      - tc_id: TC-FR02-04
        ac: AC-FR02-04
        test_file: tests/test_fr02_run.py
        test_function: test_fr02_retry_on_failure_or_timeout
        layer: integration
        type: executor_retry
        asserts:
          - "retry triggered on failed/timeout result, capped at TASKQ_RETRY_LIMIT (default 2) — canonical verbatim"
      - tc_id: TC-FR02-05
        ac: AC-FR02-05
        cross_ref_risks: [R2]
        test_file: tests/test_fr02_run.py
        test_function: test_fr02_timeout_exit4
        layer: integration
        type: executor_timeout_exit
        asserts:
          - "single-task-mode timeout result → exit_code == 4 (canonical verbatim)"
      - tc_id: TC-FR02-06
        ac: AC-FR02-06
        test_file: tests/test_fr02_run.py
        test_function: test_fr02_unhandled_exception_exit1
        layer: integration
        type: executor_error_propagation
        asserts:
          - "other unexpected exceptions → exit_code == 1 (canonical verbatim)"
          - "no bare 'except:' swallows the error (lint-enforced)"

