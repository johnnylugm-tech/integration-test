          layer: unit
          file_path: tests/test_fr01_submit.py
          asserts:
            - "exit code == 2"
            - "stderr contains validation error message"
            - "tasks.json unchanged (no write)"
          design_element: taskq.cli:validate_submit_command
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []

