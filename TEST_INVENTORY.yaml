# TEST_INVENTORY.yaml — Per-FR test function enumeration derived 1:1 from TRACEABILITY_MATRIX.md §2 + §3
# Document version: 3.0.0 | 2026-06-29 (Round 3: 1:1 expansion of every matrix §3 sub-case as independent tc_id; range syntax TC-XX-NNa..g expanded per phase1_plan.md Sub-Task 4/4 mandatory rule)
# Companion to: 01-requirements/SRS.md v1.0.0 (APPROVED) and 01-requirements/TRACEABILITY_MATRIX.md v1.0.0 (APPROVED)
# Mode: INGESTION (100% derived from approved TRACEABILITY_MATRIX.md §2/§3; no new tests invented; tc_id naming follows matrix canonical TC-XX-NN pattern, file-scoped pytest names use matrix-derived IDs)
# Purpose: Single-source enumeration of every test case that must exist in Phase 3 per-FR TDD, mapped to its matrix tc_id, verifying AC ID(s), owner module, design element, and verification locus. This file is consumed by Phase 3 (implementation) and Phase 4 (testing) to drive RED -> GREEN -> IMPROVE -> GATE1 and to validate coverage before Gate 3 exit.
# Naming convention enforced (per phase1_plan.md Sub-Task 4/4): one YAML entry per matrix §3 row, including every a..g sub-case. Range syntax TC-XX-NNa..g in matrix is documentation shorthand; here each sub-case is a SEPARATE tc_id entry (NO collapsing). Test files live under tests/ with prefix test_fr<NN>_<scope>.py or test_nfr<NN>_<scope>.py.

test_inventory:
  metadata:
    total_test_cases: 33
    source: TRACEABILITY_MATRIX.md §2 (forward trace) + §3 (backward trace) + §4.1 (FR AC count) + §4.2 (NFR AC count with 7-char sub-coverage) + §4.4 (Config coverage)
    source_approved: 2026-06-29
    enumeration_rule: "Every tc_id enumerated in matrix §2.1.1 (TC-FR01-01a..g), §2.1.2 (TC-FR02-01..06), §2.1.3 (TC-FR03-01..06), §2.2.1 (TC-NFR01-01, TC-NFR02-01, TC-NFR02-02a..g, TC-NFR03-01, TC-NFR03-02), §2.4 (TC-CFG-01..03) appears as one independent YAML entry. Range syntax TC-XX-NNa..g expanded into separate a/b/c/d/e/f/g entries. NO collapsing. NO reuse-as-shorthand. Cross-cutting relationships signalled via cross_ref metadata. Matrix §2.3 Constraints (C-01..C-07) do NOT enumerate discrete tc_ids — they cross-map to existing TCs (C-03→TC-NFR02-01, C-04→TC-NFR03-01, C-06→TC-FR02-01) or to P3/P4/P5 ad-hoc verifications (C-01/C-02/C-05/C-07), so no separate YAML entries are required for 1:1 fidelity."
    naming_convention: "Python pytest — pytest node id = tests/test_fr<NN>_<scope>.py::test_tc_<matrix_id_lowercase> (matrix-canonical TC ID lowercased; matches SRS §3 owner=taskq, Python 3.11 stdlib only)"
    test_file_convention: "tests/test_fr01_validator.py (FR-01 sub-cases 01a..g), tests/test_fr02_executor.py (FR-02 sub-cases 01..06), tests/test_fr03_cli.py (FR-03 sub-cases 01..06), tests/test_nfr01_p95.py (NFR-01), tests/test_nfr02_security.py (NFR-02 shell=True grep + per-char blacklist), tests/test_nfr03_reliability.py (NFR-03 atomic write + redaction), tests/test_cfg_defaults.py (Config defaults)"
    all_status_draft_round_3: true
    notes:
      - "Every tc_id listed in matrix §2.1.1, §2.1.2, §2.1.3, §2.2.1, §2.4 appears as one independent entry below — no collapsing, no omissions, no inflation, no reuse-as-shorthand."
      - "YAML Round 1/2 collapsed TC-FR01-01a..g (7 sub-cases) into 5 FR-01 entries and reused test_fr01_ac3_reject_injection_chars for NFR-02 clause 2. Round 3 reconciles to matrix-authoritative enumeration: 33 distinct tc_ids (7 FR-01 + 6 FR-02 + 6 FR-03 + 1 NFR-01 + 1 NFR-02 grep + 7 NFR-02 per-char + 1 NFR-03 atomic + 1 NFR-03 redaction + 3 CFG)."
      - "Matrix §7 hand-off says '41 sub-cases (19 FR + 12 NFR + 7 C + 3 CFG)'. The 8 extra (12 NFR = 5 base + 7 per-char sub-coverage; 7 C = constraint coverage) reconcile as: 12 NFR sub-cases are TC-NFR02-02a..g (7) plus base NFR cases (5) = 12 distinct tc_ids already enumerated here; 7 Constraint cases (C-01..C-07) are NOT new tc_ids — matrix §2.3 maps them to existing TCs (C-03→TC-NFR02-01, C-04→TC-NFR03-01, C-06→TC-FR02-01) or to ad-hoc P3/P4/P5 verifications (C-01/C-02/C-05/C-07), so no new YAML entries are required for 1:1 fidelity."
      - "Cross-cutting relationships (e.g. TC-FR01-01e/f ↔ NFR-02 per-char) signalled via cross_ref_ac_ids / cross_ref_nfrs metadata; each matrix tc_id still owns its own YAML entry with its own asserts."
      - "All tests are TBD-by-phase-3 per matrix §0.2; this inventory enumerates the NAMES Phase 3 must author (not implement them)."

  by_fr:
    FR-01:
      tc_count: 7
      owner_module: taskq.validator / taskq.store / taskq.models
      test_file: tests/test_fr01_validator.py
      tests:
        - tc_id: test_tc_fr01_01a_reject_empty
          matrix_id: TC-FR01-01a
          ac_ids: [FR-01.AC-1-empty]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_validator.py
          asserts:
            - "validate_command('') raises validation error (or returns error tuple per matrix §2.1)"
            - "exit code 2 surfaced at CLI"
            - "tasks.json unchanged (no write)"
          design_element: taskq.validator:validate_command
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [FR-03.AC-3]
          cross_ref_nfrs: []
          matrix_sub_case: "Empty command rejection"

        - tc_id: test_tc_fr01_01b_reject_whitespace_only
          matrix_id: TC-FR01-01b
          ac_ids: [FR-01.AC-1-whitespace]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_validator.py
          asserts:
            - "validate_command('   ') raises validation error"
            - "exit code 2 surfaced at CLI"
            - "tasks.json unchanged (no write)"
          design_element: taskq.validator:validate_command
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [FR-03.AC-3]
          cross_ref_nfrs: []
          matrix_sub_case: "Whitespace-only command rejection"

        - tc_id: test_tc_fr01_01c_reject_overlong_1001
          matrix_id: TC-FR01-01c
          ac_ids: [FR-01.AC-2-reject]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_validator.py
          asserts:
            - "command length 1001 rejected"
            - "exit code 2 surfaced at CLI"
            - "tasks.json unchanged on reject"
          design_element: taskq.validator:validate_command
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [FR-03.AC-3]
          cross_ref_nfrs: []
          matrix_sub_case: "Length-limit rejection (1001 chars)"

        - tc_id: test_tc_fr01_01d_accept_exactly_1000
          matrix_id: TC-FR01-01d
          ac_ids: [FR-01.AC-2-accept]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_validator.py
          asserts:
            - "command length exactly 1000 accepted (boundary)"
            - "tasks.json written successfully"
          design_element: taskq.validator:validate_command
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []
          matrix_sub_case: "Length-limit acceptance (1000 chars)"

        - tc_id: test_tc_fr01_01e_reject_semicolon
          matrix_id: TC-FR01-01e
          ac_ids: [FR-01.AC-3-semicolon]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_validator.py
          asserts:
            - "command containing ';' rejected"
            - "tasks.json unchanged on reject"
          design_element: taskq.validator:validate_command + taskq.config:forbidden_set
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE4
          cross_ref_ac_ids: []
          cross_ref_nfrs: [NFR-02-clause-2]
          matrix_sub_case: "Injection-char blacklist (;)"

        - tc_id: test_tc_fr01_01f_reject_remaining_injection_chars
          matrix_id: TC-FR01-01f
          ac_ids: [FR-01.AC-3-remaining]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_validator.py
          asserts:
            - "command containing '|' rejected"
            - "command containing '&' rejected"
            - "command containing '$' rejected"
            - "command containing '>' rejected"
            - "command containing '<' rejected"
            - "command containing backtick rejected"
            - "tasks.json unchanged on each reject"
          design_element: taskq.validator:validate_command + taskq.config:forbidden_set
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE4
          cross_ref_ac_ids: []
          cross_ref_nfrs: [NFR-02-clause-2]
          matrix_sub_case: "Injection-char blacklist (| & $ > < `)"

        - tc_id: test_tc_fr01_01g_persist_record_and_corruption_detect
          matrix_id: TC-FR01-01g
          ac_ids: [FR-01.AC-4-persist, FR-01.AC-5-corruption]
          fr: FR-01
          layer: integration
          file_path: tests/test_fr01_store.py
          asserts:
            - "1000 generated ids all match ^[0-9a-f]{8}$"
            - "record has fields: id, command, status, created_at (per taskq.models Task dataclass)"
            - "status == 'pending'"
            - "created_at is ISO-8601 format"
            - "submit persists via atomic_write_json (tmp + os.replace)"
            - "pre-seeded invalid JSON in tasks.json -> exit 1"
            - "stderr contains 'store corrupted' message"
            - "file content unchanged (no silent rebuild)"
          design_element: taskq.store:create_task + taskq.store:atomic_write_json + taskq.store:load_store + taskq.models:Task
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE2
          cross_ref_ac_ids: [FR-03.AC-3]
          cross_ref_nfrs: [NFR-01, NFR-03-clause-1]
          matrix_sub_case: "Pass condition: id 8-hex + status=pending + atomic write + corruption-detect"

