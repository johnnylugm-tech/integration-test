meta:
  project: taskq
  spec_version: "2.0.0"
  language: python
  python_version: "3.11"
  test_runner: pytest
  runtime_dependencies: []   # stdlib-only at runtime
  test_layer_conventions:
    unit: tests/unit/
    cli: tests/cli/
    integration: tests/integration/
    benchmark: tests/bench/
    static: tests/static/
  naming_convention: "^test_(?P<scope>unit|cli|integration|benchmark|static)_(?P<kind>fr|nfr)(?P<frnum>\\d{2})_(?P<slug>[a-z0-9_]+)$"
  notes:
    - "Test function names are the canonical D4 spec-coverage key. One test function per TC-* entry below."
    - "AC-FR01-05 (7 blacklist chars) is enumerated as 7 dedicated TC-FR01-05a..g entries (one per char: ; | & $ > < `) per TRACEABILITY_MATRIX.md §1.1."
    - "AC-NFR02-02 (7 blacklist chars) is enumerated as 7 dedicated TC-NFR02-02a..g entries per TRACEABILITY_MATRIX.md §1.5."
    - "Cross-cutting TCs shared between FR-01 and NFR-03 (atomic write, corruption) appear once under their primary FR (FR-01) per §2 ownership column and are cross-referenced via metadata.cross_ref_nfrs: [NFR-03]. The NFR-03 owner entries (TC-NFR03-01, TC-NFR03-05) carry cross_ref_frs: [FR-01] because they share an explicit §2 ownership row with FR-01; the redaction-only NFR-03 entries (TC-NFR03-02..04) carry no cross_ref_frs because §2 attributes them solely to DE-28 (executor.redact) — this asymmetry is by §2 ownership, not by preamble convention."
    - "TC-FR01-07b and TC-FR02-05b are kept as independent entries (not collapsed into 07a/05a) per the mandatory 1:1 mapping rule: each tc_id in §1 forward trace is a separate contract item, even where the assertion text partially overlaps a sibling TC. Both entries are independently executable in Phase 4."
    - "All test names use lowercase snake_case; no trailing/leading underscores; max 80 chars per name."

tests:

  # ============================================================
  # FR-01 — Task Model and Persistence (9 ACs, 22 test cases per §2)
  # ============================================================
  - fr: FR-01
    ac: AC-FR01-01
    summary: "Empty command rejected (exit 2, stderr error, no write to tasks.json)"
    layer: cli
    tc_id: TC-FR01-01a
    test_name: test_cli_fr01_empty_command_string_rejected
    asserts:
      - "CLI exit code == 2"
      - "stderr contains a validation error message"
      - "tasks.json not written (no tmp file, no target file mutation)"
  - fr: FR-01
    ac: AC-FR01-01
    summary: "None arg rejected (when command arg is missing)"
    layer: cli
    tc_id: TC-FR01-01b
    test_name: test_cli_fr01_missing_command_arg_rejected
    asserts:
      - "CLI exit code == 2"
      - "stderr contains 'missing command'"
      - "tasks.json not written"
  - fr: FR-01
    ac: AC-FR01-02
    summary: "Whitespace-only command (single space) rejected"
    layer: cli
    tc_id: TC-FR01-02a
    test_name: test_cli_fr01_whitespace_single_space_rejected
    asserts:
      - "CLI exit code == 2"
      - "stderr contains validation error"
      - "tasks.json not written"
  - fr: FR-01
    ac: AC-FR01-02
    summary: "Tabs+newlines whitespace-only command rejected"
    layer: cli
    tc_id: TC-FR01-02b
    test_name: test_cli_fr01_whitespace_tabs_newlines_rejected
    asserts:
      - "CLI exit code == 2"
      - "stderr contains validation error"
      - "tasks.json not written"
  - fr: FR-01
    ac: AC-FR01-03
    summary: "Command of exactly 1000 chars accepted (boundary inclusive)"
    layer: cli
    tc_id: TC-FR01-03
    test_name: test_cli_fr01_length_1000_accepted
    asserts:
      - "CLI exit code == 0"
      - "tasks.json contains the new task"
      - "task id is 8 lowercase hex chars"
  - fr: FR-01
    ac: AC-FR01-04
    summary: "Command of 1001 chars rejected"
    layer: cli
    tc_id: TC-FR01-04
    test_name: test_cli_fr01_length_1001_rejected
    asserts:
      - "CLI exit code == 2"
      - "stderr contains length error"
      - "tasks.json not written"
  - fr: FR-01
    ac: AC-FR01-05
    summary: "Blacklist char ';' rejected"
    layer: cli
    tc_id: TC-FR01-05a
    test_name: test_cli_fr01_blacklist_semicolon_rejected
    cross_ref_nfrs: [NFR-02]
    asserts:
      - "Submit 'echo a;b' → exit 2"
      - "stderr contains validation error"
  - fr: FR-01
    ac: AC-FR01-05
    summary: "Blacklist char '|' rejected"
    layer: cli
    tc_id: TC-FR01-05b
    test_name: test_cli_fr01_blacklist_pipe_rejected
    cross_ref_nfrs: [NFR-02]
    asserts:
      - "Submit 'echo a|b' → exit 2"
      - "stderr contains validation error"
  - fr: FR-01
    ac: AC-FR01-05
    summary: "Blacklist char '&' rejected"
    layer: cli
    tc_id: TC-FR01-05c
    test_name: test_cli_fr01_blacklist_ampersand_rejected
    cross_ref_nfrs: [NFR-02]
    asserts:
      - "Submit 'echo a&b' → exit 2"
      - "stderr contains validation error"
  - fr: FR-01
    ac: AC-FR01-05
    summary: "Blacklist char '$' rejected"
    layer: cli
    tc_id: TC-FR01-05d
    test_name: test_cli_fr01_blacklist_dollar_rejected
    cross_ref_nfrs: [NFR-02]
    asserts:
      - "Submit 'echo $HOME' → exit 2"
      - "stderr contains validation error"
  - fr: FR-01
    ac: AC-FR01-05
    summary: "Blacklist char '>' rejected"
    layer: cli
    tc_id: TC-FR01-05e
    test_name: test_cli_fr01_blacklist_gt_rejected
    cross_ref_nfrs: [NFR-02]
    asserts:
      - "Submit 'echo a>b' → exit 2"
      - "stderr contains validation error"
  - fr: FR-01
    ac: AC-FR01-05
    summary: "Blacklist char '<' rejected"
    layer: cli
    tc_id: TC-FR01-05f
    test_name: test_cli_fr01_blacklist_lt_rejected
    cross_ref_nfrs: [NFR-02]
    asserts:
      - "Submit 'echo a<b' → exit 2"
      - "stderr contains validation error"
  - fr: FR-01
    ac: AC-FR01-05
    summary: "Blacklist char backtick rejected"
    layer: cli
    tc_id: TC-FR01-05g
    test_name: test_cli_fr01_blacklist_backtick_rejected
    cross_ref_nfrs: [NFR-02]
    asserts:
      - "Submit 'echo `id`' → exit 2"
      - "stderr contains validation error"
  - fr: FR-01
    ac: AC-FR01-06
    summary: "Task id format: exactly 8 lowercase hex chars (uuid4 prefix)"
    layer: unit
    tc_id: TC-FR01-06a
    test_name: test_unit_fr01_task_id_format_eight_hex
    asserts:
      - "new_id() matches ^[0-9a-f]{8}$"
  - fr: FR-01
    ac: AC-FR01-06
    summary: "1000-iter uniqueness check on task ids"
    layer: unit
    tc_id: TC-FR01-06b
    test_name: test_unit_fr01_task_id_uniqueness_1000_iter
    asserts:
      - "set of 1000 generated ids == 1000 (no duplicates)"
  - fr: FR-01
    ac: AC-FR01-07
    summary: "New record fields present (status=pending, command, created_at parseable ISO-8601 UTC)"
    layer: unit
    tc_id: TC-FR01-07a
    test_name: test_unit_fr01_record_fields_present
    asserts:
      - "record has key 'status' with value 'pending'"
      - "record has key 'command'"
      - "record has key 'created_at'"
      - "datetime.fromisoformat(record['created_at']) succeeds and tzinfo == timezone.utc"
  - fr: FR-01
    ac: AC-FR01-07
    summary: "created_at parseable as ISO-8601 UTC (explicit parse assertion)"
    layer: unit
    tc_id: TC-FR01-07b
    test_name: test_unit_fr01_created_at_iso8601_utc_parseable
    asserts:
      - "datetime.fromisoformat(record['created_at']) succeeds"
      - "tzinfo == timezone.utc"
  - fr: FR-01
    ac: AC-FR01-08
    summary: "Atomic write: no .tmp file left behind after submit"
    layer: integration
    tc_id: TC-FR01-08a
    test_name: test_integration_fr01_atomic_write_no_tmp_leftover
    cross_ref_nfrs: [NFR-03]
    asserts:
      - "After submit, $TASKQ_HOME contains no sibling .tmp file"
  - fr: FR-01
    ac: AC-FR01-08
    summary: "Atomic write: mid-write SIGKILL trap → tasks.json still valid JSON"
    layer: integration
    tc_id: TC-FR01-08b
    test_name: test_integration_fr01_atomic_write_sigkill_trap
    cross_ref_nfrs: [NFR-03]
    asserts:
      - "json.load(tasks.json) succeeds after simulated mid-write interruption"
  - fr: FR-01
    ac: AC-FR01-09
    summary: "Corrupted tasks.json (truncated) → exit 1, stderr 'store corrupted'"
    layer: integration
    tc_id: TC-FR01-09a
    test_name: test_integration_fr01_corrupted_truncated_exit_one
    cross_ref_nfrs: [NFR-03]
    asserts:
      - "CLI exit code == 1"
      - "stderr contains 'store corrupted'"
  - fr: FR-01
    ac: AC-FR01-09
    summary: "Corrupted tasks.json (garbage bytes) → exit 1, stderr 'store corrupted'"
    layer: integration
    tc_id: TC-FR01-09b
    test_name: test_integration_fr01_corrupted_garbage_exit_one
    cross_ref_nfrs: [NFR-03]
    asserts:
      - "CLI exit code == 1"
      - "stderr contains 'store corrupted'"
  - fr: FR-01
    ac: AC-FR01-09
    summary: "Corrupted tasks.json: file content NOT replaced (no silent rebuild)"
    layer: integration
    tc_id: TC-FR01-09c
    test_name: test_integration_fr01_corrupted_content_unchanged
    cross_ref_nfrs: [NFR-03]
    asserts:
      - "After startup failure, on-disk content equals pre-failure content (byte-for-byte)"

  # ============================================================
  # FR-02 — Task Execution and Retry (10 ACs, 18 test cases per §2)
  # ============================================================
  - fr: FR-02
    ac: AC-FR02-01
    summary: "exit 0 → status 'done', exit_code==0, stdout/stderr captured in tail fields"
    layer: integration
    tc_id: TC-FR02-01
    test_name: test_integration_fr02_exit_zero_done
    asserts:
      - "task.status == 'done'"
      - "task.exit_code == 0"
      - "stdout_tail contains 'hi'"
  - fr: FR-02
    ac: AC-FR02-02
    summary: "non-zero exit (false) → status 'failed', exit_code preserved"
    layer: integration
    tc_id: TC-FR02-02a
    test_name: test_integration_fr02_exit_nonzero_failed_false
    asserts:
      - "task.status == 'failed'"
      - "task.exit_code == 1"
  - fr: FR-02
    ac: AC-FR02-02
    summary: "Specific non-zero exit (`exit 7`) → status 'failed', exit_code preserved"
    layer: integration
    tc_id: TC-FR02-02b
    test_name: test_integration_fr02_exit_nonzero_failed_exit_seven
    asserts:
      - "task.status == 'failed'"
      - "task.exit_code == 7"
  - fr: FR-02
    ac: AC-FR02-03
    summary: "TimeoutExpired → status 'timeout', CLI exit 4"
    layer: integration
    tc_id: TC-FR02-03
    test_name: test_integration_fr02_timeout_status_and_exit_code
    asserts:
      - "task.status == 'timeout'"
      - "CLI exit code == 4"
  - fr: FR-02
    ac: AC-FR02-04
    summary: "Tail truncation: 1500 chars preserved"
    layer: unit
    tc_id: TC-FR02-04a
    test_name: test_unit_fr02_tail_truncate_1500_preserved
    asserts:
      - "len(tail(1500_chars)) == 1500"
  - fr: FR-02
    ac: AC-FR02-04
    summary: "Tail truncation: 5000 chars → only last 2000 retained"
    layer: unit
    tc_id: TC-FR02-04b
    test_name: test_unit_fr02_tail_truncate_5000_to_2000
    asserts:
      - "len(tail(5000_chars)) == 2000"
      - "tail(5000_chars) == last 2000 chars of input"
  - fr: FR-02
    ac: AC-FR02-04
    summary: "Tail truncation: exactly 2000 chars boundary case"
    layer: unit
    tc_id: TC-FR02-04c
    test_name: test_unit_fr02_tail_truncate_2000_boundary
    asserts:
      - "len(tail(2000_chars)) == 2000"
      - "tail(2000_chars) == input (no truncation at boundary)"
  - fr: FR-02
    ac: AC-FR02-05
    summary: "duration_ms is non-negative integer"
    layer: unit
    tc_id: TC-FR02-05a
    test_name: test_unit_fr02_duration_ms_nonnegative
    asserts:
      - "task.duration_ms >= 0"
      - "isinstance(task.duration_ms, int)"
  - fr: FR-02
    ac: AC-FR02-05
    summary: "duration_ms type is strictly int (not float / str)"
    layer: unit
    tc_id: TC-FR02-05b
    test_name: test_unit_fr02_duration_ms_is_strict_int_type
    asserts:
      - "isinstance(task.duration_ms, int) and not isinstance(task.duration_ms, bool)"
      - "type(task.duration_ms).__name__ == 'int'"
  - fr: FR-02
    ac: AC-FR02-06
    summary: "finished_at recorded as ISO-8601 UTC"
    layer: unit
    tc_id: TC-FR02-06
    test_name: test_unit_fr02_finished_at_iso8601_utc
    asserts:
      - "datetime.fromisoformat(task.finished_at) succeeds and tzinfo == timezone.utc"
  - fr: FR-02
    ac: AC-FR02-07
    summary: "Retry on failed: default limit=2 → 3 attempts total"
    layer: integration
    tc_id: TC-FR02-07a
    test_name: test_integration_fr02_retry_failed_default_limit
    asserts:
      - "subprocess.run called 3 times (1 initial + 2 retries)"
  - fr: FR-02
    ac: AC-FR02-07
    summary: "Retry on failed: custom limit=0 → 1 attempt only (no retries)"
    layer: integration
    tc_id: TC-FR02-07b
    test_name: test_integration_fr02_retry_failed_limit_zero
    asserts:
      - "subprocess.run called 1 time (no retries)"
  - fr: FR-02
    ac: AC-FR02-07
    summary: "Retry on failed: final persisted result is last attempt's"
    layer: integration
    tc_id: TC-FR02-07c
    test_name: test_integration_fr02_retry_failed_final_result_persisted
    asserts:
      - "Persisted exit_code matches the final attempt's exit_code"
      - "task.stdout_tail / task.stderr_tail reflect the final attempt only"
  - fr: FR-02
    ac: AC-FR02-08
    summary: "Retry on timeout: repeated until TASKQ_RETRY_LIMIT"
    layer: integration
    tc_id: TC-FR02-08
    test_name: test_integration_fr02_retry_timeout_until_limit
    asserts:
      - "subprocess.run called (1 + TASKQ_RETRY_LIMIT) times"
      - "task.status == 'timeout'"
  - fr: FR-02
    ac: AC-FR02-09
    summary: "Unexpected exception → CLI exit 1"
    layer: unit
    tc_id: TC-FR02-09a
    test_name: test_unit_fr02_unexpected_exception_exit_one
    asserts:
      - "When executor raises RuntimeError, CLI exit code == 1"
  - fr: FR-02
    ac: AC-FR02-09
    summary: "No bare 'except:' in codebase (grep)"
    layer: unit
    tc_id: TC-FR02-09b
    test_name: test_unit_fr02_no_bare_except_in_codebase
    asserts:
      - "grep -rE '^\\s*except\\s*:\\s*$' taskq/ → 0 matches"
  - fr: FR-02
    ac: AC-FR02-10
    summary: "shell=True never appears in taskq/ source (static grep)"
    layer: static
    tc_id: TC-FR02-10a
    test_name: test_static_fr02_no_shell_true_in_codebase
    cross_ref_nfrs: [NFR-02]
    asserts:
      - "grep -rE 'shell\\s*=\\s*True' taskq/ → 0 matches"
  - fr: FR-02
    ac: AC-FR02-10
    summary: "subprocess.run is invoked without shell kwarg (mock inspection)"
    layer: unit
    tc_id: TC-FR02-10b
    test_name: test_unit_fr02_subprocess_run_no_shell_kwarg
    cross_ref_nfrs: [NFR-02]
    asserts:
      - "Mock subprocess.run asserts 'shell' not in kwargs (or kwargs['shell'] is False)"

  # ============================================================
  # FR-03 — CLI Integration and Query (8 ACs, 16 test cases per §2)
  # ============================================================
  - fr: FR-03
    ac: AC-FR03-01
    summary: "submit 'echo hi' round-trip succeeds (exit 0, id present)"
    layer: cli
    tc_id: TC-FR03-01
    test_name: test_cli_fr03_submit_round_trip
    asserts:
      - "CLI exit code == 0"
      - "stdout contains an 8-hex-char task id"
  - fr: FR-03
    ac: AC-FR03-02
    summary: "status <valid-id> outputs all required task fields"
    layer: cli
    tc_id: TC-FR03-02a
    test_name: test_cli_fr03_status_valid_all_fields
    asserts:
      - "Required keys present: id, status, command, created_at, exit_code, stdout_tail, stderr_tail, duration_ms, finished_at"
  - fr: FR-03
    ac: AC-FR03-02
    summary: "status <valid-id> exit code is exactly 0"
