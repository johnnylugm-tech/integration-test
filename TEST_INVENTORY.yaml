        ac: AC-NFR03-01
        cross_ref_frs: [FR-01]
        cross_ref_constraints: [C-03, C-07]
        cross_ref_risks: [R1]
        test_file: tests/test_fr01_submit.py
        test_function: test_nfr03_atomic_write_crash_safety
        layer: cross_cutting
        type: atomic_write_invariant
        asserts:
          - "tasks.json remains valid JSON after process interruption (SIGKILL mid-write — canonical verbatim)"
      - tc_id: TC-NFR03-02
        ac: AC-NFR03-02
        cross_ref_constraints: [C-07]
        cross_ref_risks: [R3]
        test_file: tests/test_fr02_run.py
