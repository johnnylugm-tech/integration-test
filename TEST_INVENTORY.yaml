# TEST_INVENTORY.yaml — P1 Test Naming Authority
# Single source of truth for test function names. Preserved verbatim by
# derive_test_cases.md into 02-architecture/TEST_SPEC.md (P2).
# Naming convention (per CLAUDE.md D4 + matrix §4.4): JS uses
# `it('test_frNN_xxx')` / Python uses `def test_frNN_xxx`.
# 1:1 mapping with TRACEABILITY_MATRIX.md §2 forward trace:
#   * Every AC row in §2.1..§2.6 ⇒ one tc_id entry below.
#   * Parametrized ranges (e.g. 7 injection chars) are EXPANDED into
#     independent tc_ids (TC-FR01-04a..TC-FR01-04g).
#   * Cross-cuts are signalled via cross_ref_frs / cross_ref_nfrs metadata,
#     NOT by collapsing or omitting entries.
test_inventory:
  format_version: "1.1"
  project: "taskq"
  source_spec: "SPEC.md v2.0.0 (2026-06-15)"
  source_requirements: "01-requirements/SRS.md v1.0 (APPROVED 2026-06-28)"
  source_matrix: "01-requirements/TRACEABILITY_MATRIX.md §2 (forward trace)"
  naming_convention: "test_frNN_xxx (Python def) / it('test_frNN_xxx') (JS)"
  derivation_date: "2026-06-28"
  derivation_phase: "P1 — Requirements"

  # -------------------------------------------------------------------------
  # FR-01 — Task Model & Persistence (taskq.store + taskq.cli.submit)
  # Matrix §2.1 rows: V1, V2, V3, AC1..AC7  (AC4 expanded into 7 sub-cases)
  # Matrix §4.1 count: 10  (with 7-parametrized counted once at matrix level;
  #                       here expanded to 12 to honour 1:1 contract rule)
  # -------------------------------------------------------------------------
  fr01:
