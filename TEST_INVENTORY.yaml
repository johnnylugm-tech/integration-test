      nfr_id: NFR-02
      ac_id: AC-NFR-02-2
      layer: unit
      module: [executor.py]
      cross_ref_frs: [FR-01]
      measurement: "unit test"
      description: "Injection blacklist test coverage"

    # --- NFR-03: Reliability — atomic writes, breaker recovery time ---
    - tc_id: TC-NFR-03-1
      name: test_nfr03_atomic_write_fault_injection
      nfr_id: NFR-03
      ac_id: AC-NFR-03-1
      layer: integration
      module: [store.py, breaker.py, cache.py]
      cross_ref_frs: [FR-02]
      measurement: "fault-injection + json.load"
      description: "Atomic write; valid JSON post-crash"

    - tc_id: TC-NFR-03-2
      name: test_nfr03_breaker_recovery_time
      nfr_id: NFR-03
      ac_id: AC-NFR-03-2
      layer: integration
      module: [breaker.py]
      measurement: "integration test"
      description: "Breaker recovery time ≤ cooldown + 1s"

    # --- NFR-04: Security — Secret Redaction ---
    - tc_id: TC-NFR-04-1
      name: test_nfr04_secret_redaction_hit_rate
      nfr_id: NFR-04
      ac_id: AC-NFR-04-1
      layer: unit
      module: [executor.py]
      measurement: "unit test on stdout_tail"
      description: "Secret redaction 100% hit rate"

    # --- NFR-05: Maintainability — docstring [FR-XX] coverage ---
    - tc_id: TC-NFR-05-1
