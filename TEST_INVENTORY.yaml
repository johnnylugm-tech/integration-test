          fr: FR-02
          layer: integration
          file_path: tests/test_fr02_cli.py
          asserts:
            - "TimeoutExpired raised -> status == 'timeout'"
            - "run <id> on permanently-timeout task -> process exit code 4"
          design_element: taskq.executor:execute_task + taskq.cli:cmd_run + FR-02 §3.2.5 exit-code mapping
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE2
          cross_ref_ac_ids: [FR-03.AC-3]
          cross_ref_nfrs: []
          matrix_sub_case: "State transition: TimeoutExpired → timeout (single-task exit 4)"

        - tc_id: test_tc_fr02_05_result_fields_persisted
          matrix_id: TC-FR02-05
