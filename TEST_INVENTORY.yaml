        test_function: test_fr03_json_flag
        layer: integration
        type: cli_output_format
        asserts:
          - "'--json' flag → single-line JSON output (canonical verbatim)"
      - tc_id: TC-FR03-07
        ac: AC-FR03-07
        test_file: tests/test_fr03_cli.py
        test_function: test_fr03_exit_code_matrix
        layer: integration
        type: cli_exit_codes
        asserts:
          - "exit-code table verbatim from canonical: 0 success / 2 input validation (incl. unknown id) / 4 task timeout / 1 other internal"

