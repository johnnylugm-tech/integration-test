# TEST_INVENTORY.yaml — Per-FR test function enumeration derived 1:1 from TRACEABILITY_MATRIX.md §2
# Document version: 1.0.0 | 2026-06-29
# Companion to: 01-requirements/SRS.md v1.0.0 (APPROVED) and 01-requirements/TRACEABILITY_MATRIX.md v1.0.0 (APPROVED)
# Mode: INGESTION (100% derived from approved TRACEABILITY_MATRIX.md §2 backward matrix; no new tests invented)
# Purpose: Single-source enumeration of every test case that must exist in Phase 3 per-FR TDD, mapped to its verifying AC ID(s), owner module, design element, and verification locus. This file is consumed by Phase 3 (implementation) and Phase 4 (testing) to drive RED -> GREEN -> IMPROVE -> GATE1 and to validate coverage before Gate 3 exit.
# Naming convention enforced: test_<frNN>_<descriptive> for Python pytest (matches harness convention per SRS §3 owner = taskq (Python); see CLAUDE.md "Language" note). Test files live under tests/ with prefix test_fr<NN>_<scope>.py or test_nfr<NN>_<scope>.py.

test_inventory:
  metadata:
    total_test_cases: 36
    source: TRACEABILITY_MATRIX.md §2 (backward matrix — Test → Design → Requirement)
    source_approved: 2026-06-29
    naming_convention: "Python pytest — test_<frNN>_<descriptive> (matches SRS §3 owner=taskq, Python 3.11 stdlib only)"
    test_file_convention: "tests/test_fr<NN>_<scope>.py for FR tests; tests/test_nfr<NN>_<scope>.py for NFR tests; tests/bench/test_nfr01_p95.py for NFR-01 benchmark"
    all_status_draft_round_1: true
    notes:
      - "Every tc_id listed in matrix §2 backward table appears as one independent entry below — no collapsing, no omissions."
      - "Tests cross-listed in §4 cross-cutting bindings (e.g., test_fr01_injection_chars_all_seven_rejected ↔ test_nfr02_blacklist_coverage) keep distinct entries; cross-cutting is signalled via cross_ref_ac_ids / cross_ref_nfrs metadata, NOT deletion."
      - "All tests are TBD-by-phase-3 per matrix §0.2; this inventory enumerates the NAMES Phase 3 must author (not implement them)."
      - "AC IDs in matrix §1 §3 with parametric/multi-case coverage (e.g., AC-FR-01.2.c enumerates 7 chars) are enumerated as separate test entries to preserve per-case contract."

  by_fr:
    FR-01:
      tc_count: 7
      owner_module: taskq.cli / taskq.store
      test_file: tests/test_fr01_submit.py + tests/test_fr01_store.py
