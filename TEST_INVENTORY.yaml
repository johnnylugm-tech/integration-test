# TEST_INVENTORY.yaml — Per-FR test function enumeration derived 1:1 from TRACEABILITY_MATRIX.md §3 + §4
# Document version: 5.0.0 | 2026-06-29 (Round 5: HIGH-severity B-2 fixes applied — removed invented TC-CFG-01..03, restored matrix-canonical TC-FR01-01..05 (split TC-FR01-04 + TC-FR01-05), restored matrix-canonical TC-FR02-01..05 (removed invented TC-FR02-06), split TC-NFR03-02 into ≥2 sub-cases per matrix C7, fixed module-owner naming drift to match matrix §2.2 verbatim. ROUND 5 ADDITIONAL FIX: FR-03 matrix_id field drift — pytest tc_id suffixes were sequential (fr03_01..fr03_06) but the matrix_id field inside each entry was mis-shifted by one (entry 02 carried TC-FR03-03, entry 06 carried invented TC-FR03-07, TC-FR03-02 silently omitted). Restored canonical alignment so each FR-03 entry's matrix_id equals its matrix §3.3 row verbatim. by_layer unit/integration counts (21/7) reconciled to per_layer_totals_reconcile (18/9).)
# Companion to: 01-requirements/SRS.md v1.0.0 (APPROVED) and 01-requirements/TRACEABILITY_MATRIX.md v1.0.0 (APPROVED)
# Mode: INGESTION (100% derived from approved TRACEABILITY_MATRIX.md §3 forward trace; no new tests invented; tc_id naming follows matrix canonical TC-FRNN-NN / TC-NFRNN-NN pattern, file-scoped pytest names use matrix-derived IDs)
# Purpose: Single-source enumeration of every test case that must exist in Phase 3 per-FR TDD, mapped to its matrix tc_id, verifying AC ID(s), owner module (per matrix §2.2), design element, and verification locus. This file is consumed by Phase 3 (implementation) and Phase 4 (testing) to drive RED -> GREEN -> IMPROVE -> GATE1 and to validate coverage before Gate 3 exit.
# Naming convention enforced (per phase1_plan.md Sub-Task 4/4): one YAML entry per matrix §3 row, including every a..g sub-case. Range syntax TC-NNFR02-02a..g in matrix is documentation shorthand; here each sub-case is a SEPARATE tc_id entry (NO collapsing). Test files live under tests/ with prefix test_fr<NN>_<scope>.py or test_nfr<NN>_<scope>.py.

test_inventory:
  metadata:
    total_test_cases: 28
    source: TRACEABILITY_MATRIX.md §3 (forward trace) + §4 (backward trace) + §5 (cross-cutting)
    source_approved: 2026-06-29
    enumeration_rule: "Every tc_id enumerated in matrix §3.1 (TC-FR01-01..05), §3.2 (TC-FR02-01..05), §3.3 (TC-FR03-01..06), §3.4 (TC-NFR01-01), §3.5 (TC-NFR02-01 + TC-NFR02-02a..g), §3.6 (TC-NFR03-01 + TC-NFR03-02a + TC-NFR03-02b) appears as one independent YAML entry. NO invented entries. NO matrix omissions. Cross-cutting relationships signalled via cross_ref_ac_ids / cross_ref_nfrs metadata. Module-owner names match matrix §2.2 verbatim (taskq.validate; taskq.cli.{submit_cmd, run_cmd, status_cmd, list_cmd, clear_cmd}; taskq.store.{atomic_write_json, new_task_id, save_tasks, load_tasks}; taskq.executor.{run_task, run_with_retry}; taskq.redact.redact_line; taskq.config.{get_home, get_task_timeout, get_retry_limit})."
    naming_convention: "Python pytest — pytest node id = tests/test_fr<NN>_<scope>.py::test_tc_<matrix_id_lowercase_with_sub_case> (matrix-canonical TC ID lowercased; matches SRS §1.4 owner=taskq, Python 3.11 stdlib only)"
    test_file_convention: "tests/test_fr01_submit.py (FR-01 AC-1..AC-5), tests/test_fr02_run.py (FR-02 AC-1..AC-5), tests/test_fr03_cli.py (FR-03 AC-1..AC-6), tests/test_nfr01_perf.py (NFR-01), tests/test_nfr02_security.py (NFR-02 shell=True grep + per-char blacklist), tests/test_nfr03_reliability.py (NFR-03 atomic write + redaction sub-cases)"
    all_status_draft_round_4: true
    notes:
      - "Every tc_id listed in matrix §3.1..§3.6 appears as one independent entry below — no collapsing, no omissions, no inflation, no reuse-as-shorthand, no invented TC IDs."
      - "Round 5 HIGH-severity B-2 fixes applied (Round 4 fixes preserved): (1) removed invented TC-CFG-01..03 (matrix has zero CFG sections); (2) split Round 3's test_tc_fr01_01g (collapsed TC-FR01-04+05) into two matrix-canonical entries test_tc_fr01_04 + test_tc_fr01_05; (3) removed invented TC-FR02-06_retry_policy; (4) split test_tc_nfr03_02 (collapsed sk-/token= branches) into 02a + 02b per matrix §3.6 L121; (5) corrected module-owner naming drift to match matrix §2.2 verbatim; (6) NEW Round 5 B-2 REJECT fixes — (a) FR-03 matrix_id drift: pytest tc_id suffixes were sequential (fr03_01..fr03_06) but the matrix_id FIELD inside each entry was mis-shifted by one, causing entry fr03_02 to carry TC-FR03-03 (inventing TC-FR03-07 at entry fr03_06 and omitting TC-FR03-02 entirely). Restored canonical alignment: fr03_01 -> TC-FR03-01 (AC-1), fr03_02 -> TC-FR03-02 (AC-2), fr03_03 -> TC-FR03-03 (AC-3), fr03_04 -> TC-FR03-04 (AC-4), fr03_05 -> TC-FR03-05 (AC-5), fr03_06 -> TC-FR03-06 (AC-6). Now every FR-03 YAML matrix_id matches the matrix §3.3 row verbatim. (b) by_layer count drift: unit was 21 but actual enumerated unit entries are 18 (FR-01:3 + FR-02:3 + FR-03:3 + NFR-02:7 + NFR-03:2); integration was 7 but actual enumerated integration entries are 9 (FR-01:2 + FR-02:2 + FR-03:3 + NFR-02:1 + NFR-03:1). Reconciled by_layer counts to 18/9/1 — both blocks now sum to 28."
      - "Resulting enumeration: 5 FR-01 + 5 FR-02 + 6 FR-03 + 1 NFR-01 + 1 NFR-02 grep + 7 NFR-02 per-char + 1 NFR-03 atomic + 2 NFR-03 redaction = 28 distinct tc_ids, all directly traceable to matrix §3 row entries."
      - "Cross-cutting relationships (e.g. FR-01.AC-3 ↔ NFR-02.AC-2 per-char) signalled via cross_ref_ac_ids / cross_ref_nfrs metadata; each matrix tc_id still owns its own YAML entry with its own asserts."
      - "All tests are TBD-by-phase-3 per matrix; this inventory enumerates the NAMES Phase 3 must author (not implement them)."

  by_fr:
    FR-01:
      tc_count: 5
      owner_module: taskq.validate / taskq.cli.submit_cmd / taskq.store
      test_file: tests/test_fr01_submit.py
      tests:
        - tc_id: test_tc_fr01_01_reject_empty_or_whitespace
          matrix_id: TC-FR01-01
          ac_ids: [FR-01.AC-1]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_submit.py
          asserts:
            - "submit '' -> exit code 2"
            - "stderr contains rejection message"
            - "tasks.json unchanged (no write)"
            - "submit '   ' (whitespace-only) -> exit code 2"
            - "tasks.json unchanged on whitespace-only reject"
          design_element: taskq.validate.is_empty + taskq.cli.submit_cmd (error branch)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [FR-03.AC-6]
          cross_ref_nfrs: []
          matrix_sub_case: "Empty / whitespace-only reject (AC-1)"

        - tc_id: test_tc_fr01_02_reject_overlong
          matrix_id: TC-FR01-02
          ac_ids: [FR-01.AC-2]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_submit.py
          asserts:
            - "submit with command length 1001 -> exit code 2"
            - "stderr contains length rejection message"
            - "tasks.json unchanged on reject"
            - "submit with command length exactly 1000 -> accepted (boundary, no reject)"
            - "tasks.json written successfully on accept"
          design_element: taskq.validate.check_length + taskq.cli.submit_cmd (error branch)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [FR-03.AC-6]
          cross_ref_nfrs: []
          matrix_sub_case: "Length > 1000 reject (AC-2) — including 1000-char boundary accept"

        - tc_id: test_tc_fr01_03_reject_injection_chars
          matrix_id: TC-FR01-03
          ac_ids: [FR-01.AC-3]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_submit.py
          asserts:
            - "submit with command containing ';' -> exit code 2"
            - "submit with command containing '|' -> exit code 2"
            - "submit with command containing '&' -> exit code 2"
            - "submit with command containing '$' -> exit code 2"
            - "submit with command containing '>' -> exit code 2"
            - "submit with command containing '<' -> exit code 2"
            - "submit with command containing '`' -> exit code 2"
            - "tasks.json unchanged on every reject"
          design_element: taskq.validate.check_injection_chars + taskq.cli.submit_cmd (error branch)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE4
          cross_ref_ac_ids: [FR-03.AC-6]
          cross_ref_nfrs: [NFR-02-AC-2]
          matrix_sub_case: "Injection-char reject (AC-3) — any of ; | & $ > < ` triggers exit 2"

        - tc_id: test_tc_fr01_04_valid_submit_writes_pending
          matrix_id: TC-FR01-04
          ac_ids: [FR-01.AC-4]
          fr: FR-01
          layer: integration
          file_path: tests/test_fr01_submit.py
          asserts:
            - "1000 generated ids all match ^[0-9a-f]{8}$"
            - "record has fields: id, command, status, created_at"
            - "status == 'pending'"
            - "created_at is ISO-8601 format"
            - "submit persists via atomic_write_json (tmp + os.replace)"
            - "tasks.json valid JSON after submit"
          design_element: taskq.store.new_task_id + taskq.store.atomic_write_json + taskq.store.save_tasks + taskq.cli.submit_cmd (success branch)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE2
          cross_ref_ac_ids: [FR-03.AC-6]
          cross_ref_nfrs: [NFR-01, NFR-03-AC-1]
          matrix_sub_case: "Valid submit writes uuid4-8hex id + pending + atomic write (AC-4)"

        - tc_id: test_tc_fr01_05_corrupt_store_exits_one
          matrix_id: TC-FR01-05
          ac_ids: [FR-01.AC-5]
          fr: FR-01
          layer: integration
          file_path: tests/test_fr01_submit.py
          asserts:
            - "pre-seeded invalid JSON in $TASKQ_HOME/tasks.json -> exit code 1"
            - "stderr contains 'store corrupted' message"
            - "file content unchanged on disk (no silent rebuild)"
            - "no task is created in the (uncorrupted) in-memory state"
          design_element: taskq.store.load_tasks (parse-fail branch) + taskq.cli.submit_cmd (startup hook)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE2
          cross_ref_ac_ids: [FR-03.AC-6]
          cross_ref_nfrs: [NFR-03-AC-1]
          matrix_sub_case: "Corrupt store detected at startup -> exit 1 + 'store corrupted' (AC-5)"

    FR-02:
      tc_count: 5
      owner_module: taskq.executor / taskq.cli.run_cmd / taskq.config
      test_file: tests/test_fr02_run.py
      tests:
        - tc_id: test_tc_fr02_01_subprocess_no_shell
          matrix_id: TC-FR02-01
          ac_ids: [FR-02.AC-1]
          fr: FR-02
          layer: unit
          file_path: tests/test_fr02_run.py
          asserts:
            - "subprocess.run called with shlex.split(command) as argv list"
            - "capture_output=True, text=True, timeout=TASKQ_TASK_TIMEOUT kwargs present"
            - "shell=False kwarg present (shell=True never used)"
          design_element: taskq.executor.run_task + subprocess.run call site
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE4
          cross_ref_ac_ids: []
          cross_ref_nfrs: [NFR-02-AC-1]
          matrix_sub_case: "Execution via subprocess.run(shlex.split(...)); shell=True forbidden (AC-1)"

        - tc_id: test_tc_fr02_02_result_fields_persisted
          matrix_id: TC-FR02-02
          ac_ids: [FR-02.AC-2]
          fr: FR-02
          layer: unit
          file_path: tests/test_fr02_run.py
          asserts:
            - "result record has exit_code field"
            - "result record has stdout_tail (last 2000 chars)"
            - "result record has stderr_tail (last 2000 chars)"
            - "result record has duration_ms field"
            - "result record has finished_at field"
            - "stdout_tail == captured stdout[-2000:] when stdout exceeds 2000 chars"
            - "stderr_tail == captured stderr[-2000:] when stderr exceeds 2000 chars"
          design_element: taskq.executor.run_task (post-exec field capture) + taskq.store.save_tasks
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: [NFR-03-AC-2]
          matrix_sub_case: "Result fields persisted: exit_code, stdout_tail, stderr_tail, duration_ms, finished_at (AC-2)"

        - tc_id: test_tc_fr02_03_retry_on_failed_or_timeout
          matrix_id: TC-FR02-03
          ac_ids: [FR-02.AC-3]
          fr: FR-02
          layer: integration
          file_path: tests/test_fr02_run.py
          asserts:
            - "run returning non-zero exit -> retried up to TASKQ_RETRY_LIMIT times (default 2)"
            - "run returning TimeoutExpired -> retried up to TASKQ_RETRY_LIMIT times (default 2)"
            - "retry counter equals TASKQ_RETRY_LIMIT after exhaustion"
            - "successful run (exit 0) -> single attempt, no retry"
            - "final status reflects last attempt's outcome"
          design_element: taskq.executor.run_with_retry + taskq.config.get_retry_limit
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE2
          cross_ref_ac_ids: []
          cross_ref_nfrs: []
          matrix_sub_case: "Retry failed/timeout up to TASKQ_RETRY_LIMIT (default 2) (AC-3)"

        - tc_id: test_tc_fr02_04_timeout_exit_4
          matrix_id: TC-FR02-04
          ac_ids: [FR-02.AC-4]
          fr: FR-02
          layer: integration
          file_path: tests/test_fr02_run.py
          asserts:
            - "TimeoutExpired raised by executor in single-task run -> process exit code 4"
            - "final task status == 'timeout'"
            - "stderr contains the timeout-class error mapping"
          design_element: taskq.executor.run_task (TimeoutExpired path) + taskq.cli.run_cmd (exit-code mapping)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE2
          cross_ref_ac_ids: [FR-03.AC-6]
          cross_ref_nfrs: []
          matrix_sub_case: "Single-task mode timeout -> exit 4 (AC-4)"

        - tc_id: test_tc_fr02_05_unexpected_exception_exit_1
          matrix_id: TC-FR02-05
          ac_ids: [FR-02.AC-5]
          fr: FR-02
          layer: unit
          file_path: tests/test_fr02_run.py
          asserts:
            - "unexpected exception raised in run path propagates to exit code 1"
            - "no bare 'except:' clause exists in taskq.executor.run_with_retry"
            - "no bare 'except:' clause exists in taskq.cli.run_cmd"
            - "stderr contains the exception class name and message"
          design_element: taskq.executor.run_with_retry (no bare except) + taskq.cli.run_cmd (top-level catch)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [FR-03.AC-6]
          cross_ref_nfrs: []
          matrix_sub_case: "Unexpected exception -> exit 1, no bare except: (AC-5)"

    FR-03:
      tc_count: 6
      owner_module: taskq.cli.main / taskq.cli.{submit_cmd, run_cmd, status_cmd, list_cmd, clear_cmd}
      test_file: tests/test_fr03_cli.py
      tests:
        - tc_id: test_tc_fr03_01_argparse_subcommands
          matrix_id: TC-FR03-01
          ac_ids: [FR-03.AC-1]
          fr: FR-03
          layer: integration
          file_path: tests/test_fr03_cli.py
          asserts:
            - "python -m taskq --help lists submit, run, status, list, clear subcommands"
            - "submit, run, status, list, clear each parse via argparse subparsers"
            - "global --json flag appears on every subcommand's parser"
          design_element: taskq.cli.main + taskq.cli.build_parser (argparse subparsers)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [FR-03.AC-5]
          cross_ref_nfrs: []
          matrix_sub_case: "python -m taskq exposes submit/run/status/list/clear via argparse (AC-1)"

        - tc_id: test_tc_fr03_02_status_outputs_or_unknown
          matrix_id: TC-FR03-02
          ac_ids: [FR-03.AC-2]
          fr: FR-03
          layer: unit
          file_path: tests/test_fr03_cli.py
          asserts:
            - "status <known-id> prints all task fields (id, status, command, created_at, exit_code, stdout_tail, stderr_tail, duration_ms, finished_at)"
            - "status <unknown-id> -> exit code 2"
            - "stderr contains 'unknown task: <id>' verbatim"
          design_element: taskq.cli.status_cmd + taskq.store.load_tasks
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [FR-03.AC-6]
          cross_ref_nfrs: [NFR-01]
          matrix_sub_case: "status <id> outputs all fields; unknown id -> exit 2 + 'unknown task: <id>' (AC-2)"

        - tc_id: test_tc_fr03_03_list_outputs_per_task
          matrix_id: TC-FR03-03
          ac_ids: [FR-03.AC-3]
          fr: FR-03
          layer: unit
          file_path: tests/test_fr03_cli.py
          asserts:
            - "list outputs exactly N lines for N tasks"
            - "each line contains id, status, and command[:50] fields"
            - "command column truncated to first 50 chars when command longer"
          design_element: taskq.cli.list_cmd + taskq.store.load_tasks
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []
          matrix_sub_case: "list outputs id + status + first 50 chars of command per task (AC-3)"

        - tc_id: test_tc_fr03_04_clear_empties_store
          matrix_id: TC-FR03-04
          ac_ids: [FR-03.AC-4]
          fr: FR-03
          layer: integration
          file_path: tests/test_fr03_cli.py
          asserts:
            - "clear empties $TASKQ_HOME/tasks.json (subsequent list returns no tasks)"
            - "tasks.json is valid empty JSON after clear"
            - "clear uses atomic_write_json path (not direct overwrite)"
          design_element: taskq.cli.clear_cmd + taskq.store.save_tasks (empty list)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: [NFR-03-AC-1]
          matrix_sub_case: "clear empties $TASKQ_HOME/tasks.json (AC-4)"

        - tc_id: test_tc_fr03_05_json_flag_single_line
          matrix_id: TC-FR03-05
          ac_ids: [FR-03.AC-5]
          fr: FR-03
          layer: unit
          file_path: tests/test_fr03_cli.py
          asserts:
            - "--json flag accepted by all subcommands (submit, run, status, list, clear)"
            - "--json output has no embedded newlines (single line of JSON)"
            - "json.loads(stdout) succeeds without exception"
          design_element: taskq.cli.main (json-mode formatting) + taskq.cli.status_cmd + taskq.cli.list_cmd (json branch)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE4
          cross_ref_ac_ids: []
          cross_ref_nfrs: []
          matrix_sub_case: "Global --json flag -> single-line JSON output (AC-5)"

        - tc_id: test_tc_fr03_06_exit_code_matrix
          matrix_id: TC-FR03-06
          ac_ids: [FR-03.AC-6]
          fr: FR-03
          layer: integration
          file_path: tests/test_fr03_cli.py
          asserts:
            - "exit 0: success path (status of a known task)"
            - "exit 2: input validation error (submit empty; status unknown id)"
            - "exit 4: task timeout (run on a task whose final result is timeout)"
            - "exit 1: other internal error (corrupt store; unexpected exception in run)"
          design_element: taskq.cli.main (exit-code matrix dispatch) + taskq.cli.submit_cmd + taskq.cli.run_cmd + taskq.cli.status_cmd + taskq.cli.clear_cmd
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE2
          cross_ref_ac_ids: []
          cross_ref_nfrs: []
          matrix_sub_case: "Exit-code matrix 0 / 2 / 4 / 1 (AC-6)"

    NFR-01:
      tc_count: 1
      owner_module: test harness (cross-cutting)
      test_file: tests/test_nfr01_perf.py
      tests:
        - tc_id: test_tc_nfr01_01_p95_under_50ms
          matrix_id: TC-NFR01-01
          ac_ids: [NFR-01-AC-1]
          fr: NFR-01
          layer: benchmark
          file_path: tests/test_nfr01_perf.py
          asserts:
            - "100 iterations of submit (valid command) + status (returned id) cycle"
            - "95th-percentile wall-clock latency < 50ms"
            - "subprocess execution time excluded from measurement (mocked)"
          design_element: end-to-end submit+status loop (taskq.cli.submit_cmd + taskq.cli.status_cmd + taskq.store.atomic_write_json + taskq.store.load_tasks)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> BASELINE
          cross_ref_ac_ids: [FR-01.AC-4, FR-03.AC-1]
          cross_ref_nfrs: []
          matrix_sub_case: "p95 of 100 combined submit+status invocations < 50ms (excludes subprocess exec)"

    NFR-02:
      tc_count: 8
      owner_module: taskq.executor (static check) + taskq.validate.check_injection_chars + taskq.cli.submit_cmd (error branch)
      test_file: tests/test_nfr02_security.py
      tests:
        - tc_id: test_tc_nfr02_01_no_shell_true_grep
          matrix_id: TC-NFR02-01
          ac_ids: [NFR-02-AC-1]
          fr: NFR-02
          layer: integration
          file_path: tests/test_nfr02_security.py
          asserts:
            - "AST/grep scan of all taskq/**/*.py finds zero 'shell=True' kwarg in any subprocess.* call"
            - "passes for both executor unit (single call site) and codebase-wide scan"
          design_element: taskq.executor.run_task (single subprocess.run call site with shell=False)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE2 -> GATE4
          cross_ref_ac_ids: [FR-02.AC-1]
          cross_ref_nfrs: []
          matrix_sub_case: "Codebase grep: zero shell=True in production code (AC-1)"

        - tc_id: test_tc_nfr02_02a_reject_semicolon
          matrix_id: TC-NFR02-02a
          ac_ids: [NFR-02-AC-2]
          fr: NFR-02
          layer: unit
          file_path: tests/test_nfr02_security.py
          asserts:
            - "validate_command(';') rejected (per-character blacklist unit)"
          design_element: taskq.validate.check_injection_chars (blacklist source-of-truth)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE4
          cross_ref_ac_ids: [FR-01.AC-3]
          cross_ref_nfrs: []
          matrix_sub_case: "Per-char blacklist unit test (;)"

        - tc_id: test_tc_nfr02_02b_reject_pipe
          matrix_id: TC-NFR02-02b
          ac_ids: [NFR-02-AC-2]
          fr: NFR-02
          layer: unit
          file_path: tests/test_nfr02_security.py
          asserts:
            - "validate_command('|') rejected (per-character blacklist unit)"
          design_element: taskq.validate.check_injection_chars
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE4
          cross_ref_ac_ids: [FR-01.AC-3]
          cross_ref_nfrs: []
          matrix_sub_case: "Per-char blacklist unit test (|)"

        - tc_id: test_tc_nfr02_02c_reject_ampersand
          matrix_id: TC-NFR02-02c
          ac_ids: [NFR-02-AC-2]
          fr: NFR-02
          layer: unit
          file_path: tests/test_nfr02_security.py
          asserts:
            - "validate_command('&') rejected (per-character blacklist unit)"
          design_element: taskq.validate.check_injection_chars
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE4
