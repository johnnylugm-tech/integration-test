            - "command length exactly 1000 -> accepted (boundary)"
            - "tasks.json unchanged on reject"
          design_element: taskq.cli:validate_submit_command
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []

