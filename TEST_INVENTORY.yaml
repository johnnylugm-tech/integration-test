          asserts:
            - "result has fields: exit_code, stdout_tail, stderr_tail, duration_ms, finished_at"
            - "stdout_tail and stderr_tail are last 2000 chars of output (text[-2000:]) — Python char-slice is harness-owned measurement; SRS §8 NFR-99 flags byte-vs-char ambiguity as open issue for stakeholder resolution"
            - "all 5 fields present in store record"
          design_element: taskq.executor:execute_task + taskq.models:Result
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []
          matrix_sub_case: "Result fields persisted: exit_code, stdout_tail, stderr_tail, duration_ms, finished_at"

        - tc_id: test_tc_fr02_06_retry_policy
          matrix_id: TC-FR02-06
