  #                       7 sub-cases is YAML-level decomposition, not matrix)
  # YAML expansion: 14 tc_ids (1, 1b whitespace sub-case, 2, 3a..g (7) injection,
  #                       4 id-format, 5 pending-fields, 6 corrupted-store, 7 atomic)
  # -------------------------------------------------------------------------
