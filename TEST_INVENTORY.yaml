# TEST_INVENTORY.yaml — P1 Test Naming Authority
# Single source of truth for test function names. Preserved verbatim by
# derive_test_cases.md into 02-architecture/TEST_SPEC.md (P2).
# Naming convention (per CLAUDE.md D4 + matrix §4.4): JS uses
# `it('test_frNN_xxx')` / Python uses `def test_frNN_xxx`.
# File-path scheme matches TRACEABILITY_MATRIX.md §2 / §3 / §4 (one file per
# canonical AC, e.g. `tests/test_fr01_empty_command_rejected.py`). When an
# AC is parametrized (e.g. 7 injection chars), each sub-case lives in the
# SAME matrix-named file using pytest parametrize — the file name is the
# matrix anchor, the test function is the per-sub-case identifier.
# Canonical cross-ref schema (used uniformly below):
#   cross_ref_frs         — list of FR IDs this tc touches
#   cross_ref_nfrs        — list of NFR IDs this tc touches
#   cross_ref_constraints — list of C-N IDs (SRS §2 declared range: C-1..C-4)
#   cross_ref_risks       — list of R-N IDs (SRS §9 declared range: R1..R3)
#   cross_ref_ac          — list of canonical AC IDs from SRS §6
test_inventory:
  format_version: "1.2"
  project: "taskq"
  source_spec: "SPEC.md v2.0.0 (2026-06-15)"
  source_requirements: "01-requirements/SRS.md v1.0 (APPROVED 2026-06-28)"
  source_matrix: "01-requirements/TRACEABILITY_MATRIX.md §2 (forward trace)"
  naming_convention: "test_frNN_xxx (Python def) / it('test_frNN_xxx') (JS)"
  derivation_date: "2026-06-28"
  derivation_phase: "P1 — Requirements"

