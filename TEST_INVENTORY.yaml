  # Matrix §2.6 rows: AC-NFR03-01..02 (canonical = 2 ACs).
  # NFR-03 enumerated tc_id count = 2.
  # -------------------------------------------------------------------------
  nfr03:
    title: "reliability (atomic write + secret redaction)"
    srs_section: "SRS.md §4.3"
    spec_section: "SPEC.md §4 NFR-03"
    owning_module: "taskq.store + taskq.executor"
    tests:
