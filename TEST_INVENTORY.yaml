      - test_static_fr02_no_shell_true_in_codebase
  FR-03:
    cli:
      - test_cli_fr03_submit_round_trip
      - test_cli_fr03_status_valid_all_fields
      - test_cli_fr03_status_valid_exit_code_zero
      - test_cli_fr03_status_unknown_id_exit_two
