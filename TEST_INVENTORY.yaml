  # -------------------------------------------------------------------------
  # FR-02 — Task Execution & Retry (taskq.executor — High-Risk Module)
  # Matrix §2.2 rows: AC1..AC12 + AC6a + AC6b
  # Matrix §4.1 count: 14
  # -------------------------------------------------------------------------
  fr02:
    title: "任務執行與重試 (Task Execution & Retry)"
    srs_section: "SRS.md §3.2"
    spec_section: "SPEC.md §3 FR-02"
    owning_module: "taskq.executor (high-risk)"
    tests:
      - tc_id: TC-FR02-01
        ac: FR-02.AC1
        test_file: tests/test_fr02_run.py
        test_function: test_run_done
        layer: integration
        type: executor_success
        asserts:
          - "exit_code == 0"
          - "task.status == 'done'"
          - "task.exit_code == 0"
      - tc_id: TC-FR02-02
        ac: FR-02.AC2
        cross_ref: [FR-02.AC6]
        test_file: tests/test_fr02_run.py
        test_function: test_run_failed_with_retries
        layer: integration
        type: executor_failure_retry
        asserts:
          - "task.status == 'failed' after retries"
          - "task.exit_code != 0"
          - "total subprocess invocations bounded by TASKQ_RETRY_LIMIT"
      - tc_id: TC-FR02-03
        ac: FR-02.AC3
        cross_ref: [FR-02.AC11]
        cross_ref_risks: [R2]
        test_file: tests/test_fr02_run.py
        test_function: test_run_timeout_exit4
        layer: integration
        type: executor_timeout
        asserts:
          - "task.status == 'timeout'"
          - "exit_code == 4 after retry exhaustion"
      - tc_id: TC-FR02-04
        ac: FR-02.AC4
        test_file: tests/test_fr02_run.py
        test_function: test_run_stdout_tail
        layer: integration
        type: executor_output_capture
        asserts:
          - "stdout_tail == 'hello\\n' for 'echo hello'"
          - "stderr_tail is empty"
          - "duration_ms >= 0"
          - "finished_at is set"
      - tc_id: TC-FR02-05
        ac: FR-02.AC5
        cross_ref_nfrs: [NFR-02.AC1]
        cross_ref_constraints: [C-01]
        test_file: tests/test_fr02_run.py
        test_function: test_no_shell_true_invariant
        layer: cross_cutting
        type: static_grep
        asserts:
          - "grep -rn 'shell=True' src/ returns 0 matches"
        note: "Codebase-wide invariant; static check, not a runtime test."
      - tc_id: TC-FR02-06
        ac: FR-02.AC6
        test_file: tests/test_fr02_run.py
        test_function: test_retry_cap_default
        layer: integration
        type: executor_retry_cap
        asserts:
          - "default retry cap (TASKQ_RETRY_LIMIT=2) honored"
          - "total invocations bounded"
      - tc_id: TC-FR02-06a
        ac: FR-02.AC6a
        test_file: tests/test_fr02_run.py
        test_function: test_retry_cap_zero
        layer: integration
        type: executor_retry_cap_override
        asserts:
          - "TASKQ_RETRY_LIMIT=0 → exactly 1 invocation, no retry"
      - tc_id: TC-FR02-06b
        ac: FR-02.AC6b
        test_file: tests/test_fr02_run.py
        test_function: test_retry_on_timeout
        layer: integration
        type: executor_retry_condition
        asserts:
          - "retry is triggered on timeout result, not only on failed"
      - tc_id: TC-FR02-07
        ac: FR-02.AC7
        test_file: tests/test_fr02_run.py
        test_function: test_no_retry_on_done
        layer: integration
        type: executor_retry_condition
        asserts:
          - "on status 'done' no retry is attempted"
          - "total invocations == 1"
      - tc_id: TC-FR02-08
        ac: FR-02.AC8
        cross_ref_constraints: [C-08]
        cross_ref_risks: [R6]
        test_file: tests/test_fr02_run.py
        test_function: test_unexpected_exception_exit1
        layer: integration
        type: executor_error_propagation
        asserts:
          - "unexpected exception → exit 1"
          - "no bare 'except:' masks the error (lint-enforced)"
      - tc_id: TC-FR02-09
        ac: FR-02.AC9
        cross_ref_risks: [R7]
        test_file: tests/test_fr02_run.py
        test_function: test_stdout_tail_2000
        layer: integration
        type: executor_output_tail
        asserts:
          - "output > 2000 chars → stdout_tail is exactly last 2000 chars"
      - tc_id: TC-FR02-10
        ac: FR-02.AC10
        test_file: tests/test_fr02_run.py
        test_function: test_taskq_home_override
        layer: integration
        type: config_override
        asserts:
          - "TASKQ_HOME=<custom> → tasks.json written at $TASKQ_HOME"
          - "default .taskq/ not used"
      - tc_id: TC-FR02-11
        ac: FR-02.AC11
        test_file: tests/test_fr02_run.py
        test_function: test_taskq_task_timeout_override
        layer: integration
        type: config_override
        asserts:
          - "TASKQ_TASK_TIMEOUT=0.05 → timeout path (status 'timeout', exit 4)"
      - tc_id: TC-FR02-12
        ac: FR-02.AC12
        test_file: tests/test_fr02_run.py
        test_function: test_taskq_retry_limit_override
        layer: integration
        type: config_override
        asserts:
          - "TASKQ_RETRY_LIMIT=3 → retry cap honors override"
          - "final status 'failed'"

