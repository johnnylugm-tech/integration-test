# TEST_INVENTORY.yaml — P1 Naming Authority (taskq)
#
# Maps every FR/NFR to expected test function names. These are the AUTHORITATIVE
# names that derive_test_cases.md preserves in TEST_SPEC.md (P2 single source of
# truth). Specified per FR and per test category (unit / integration / cross_cutting).
# If no name is specified for a category, derive_test_cases.md fills the gap with
# names derived via the 7-Question Protocol.
#
# Source: SRS.md v2.0.0 §8 (APPROVED 2026-06-17) + TRACEABILITY_MATRIX.md v1.0
# Phase: 1 — Requirements Specification
# Project: taskq
# Date: 2026-06-17
#
# Round-2 patch (Agent B): eliminate test-name duplication between NFR-* and
# cross_cutting.* sections; reconcile inventory count with TRACEABILITY_MATRIX.
#
# Count reconciliation (round-2):
#   - Inventory enumerates 45 unique test function names (the P1 naming authority)
#   - TRACEABILITY_MATRIX.md Code↔Test Mapping lists 24 entries (one row per
#     test file/cluster, aggregating multiple test_fr*_* functions per FR)
#   - TRACEABILITY_MATRIX.md Backward Mapping lists 25 entries (test → FR,
#     parametrized 6-char expansion counted as 1 row)
#   - The 21-test gap is INTENDED: the inventory decomposes each matrix row
#     into discrete behavioural assertions (e.g., FR-02 matrix row aggregates
#     test_fr02_run_exit_zero_yields_done + test_fr02_run_nonzero_yields_failed
#     + test_fr02_run_timeout_yields_timeout_and_exit_four + … into one
#     "test_fr02_state_machine.py" row). Matrix aggregates by test FILE; inventory
#     enumerates by test FUNCTION. P3 (build_trace.py) must reconcile by reading
#     the actual test files, not by naive 1:1 counting.
#
# Structural asymmetry: FR sections (FR-01..FR-03) and NFR sections (NFR-01..NFR-03)
# are placed as siblings under fr_tests (not promoted to a separate nfr_tests.*
# parent), because NFRs are property/quality gates rather than functional scope.
# The "NFR section" is denoted by the FR ID-style key prefix and the absence of
# fr_tests.* nesting for NFRs is INTENTIONAL — cross_cutting.* is the single home
# for cross-cutting concerns, while FR/NFR coverage lives in fr_tests.
format_version: "1.1"

# Naming convention:
#   test_fr<NN>_<topic>_<expected>     - per-FR behavioural tests (FR-01..FR-03)
#   test_nfr<NN>_<metric>              - per-NFR metric assertions (NFR-01..NFR-03)
#   test_kpi_<metric>_<target>         - KPI/SLO gates (alias for performance)
#   test_redteam_<attack>              - security adversarial tests
#   test_reliability_<scenario>        - reliability/correctness scenarios
#   test_config_<envvar>               - configuration liveness

fr_tests:
  FR-01:
    # 任務模型與持久化:submit 驗證(非空/長度/注入字元 6 字元)+ uuid4 id + 原子寫 + 損壞偵測
    unit:
      - test_fr01_submit_valid_command_returns_zero
      - test_fr01_submit_empty_command_returns_two
      - test_fr01_submit_whitespace_command_returns_two
      - test_fr01_submit_long_command_returns_two
      - test_fr01_submit_injection_chars_returns_two  # pytest.mark.parametrize over 6 chars: ; | & $ > < `
      - test_fr01_submit_produces_uuid4_id_format
    integration:
      - test_fr01_store_corruption_returns_one

  FR-02:
    # 任務執行與重試:subprocess.run(shlex.split, shell=False, timeout) + 狀態機 + 重試 + exit 4 / exit 1
    unit:
      - test_fr02_run_executes_subprocess_with_shell_false
      - test_fr02_run_exit_zero_yields_done
      - test_fr02_run_nonzero_yields_failed
      - test_fr02_run_timeout_yields_timeout_and_exit_four
      - test_fr02_run_failed_retries_up_to_limit
      - test_fr02_run_retry_limit_respected
      - test_fr02_run_captures_stdout_tail_under_2000_chars
      - test_fr02_run_captures_stderr_tail_under_2000_chars
      - test_fr02_run_records_duration_ms_and_finished_at
      - test_fr02_run_unexpected_exception_returns_one
    integration:
      - test_fr02_cli_run_timeout_returns_four
      - test_fr02_cli_run_success_returns_zero

  FR-03:
    # CLI 整合與查詢:argparse 子命令 submit/run/status/list/clear + --json + exit codes
    unit:
      - test_fr03_status_unknown_id_returns_two
      - test_fr03_status_known_id_returns_full_record
      - test_fr03_list_returns_all_tasks
      - test_fr03_list_truncates_command_to_50_chars
      - test_fr03_clear_empties_store
      - test_fr03_json_flag_emits_single_line_json
      - test_fr03_exit_code_matrix  # parametrize over (0/2/4/1)
    integration:
      - test_fr03_end_to_end_submit_run_status_list_clear
      - test_fr03_help_text_lists_all_subcommands

  NFR-01:
    # NFR-01 is covered by exactly one test: test_kpi_p95_submit_status_under_50ms
    # (canonical entry in cross_cutting.performance). The "excludes subprocess time"
    # timing condition is verified inside the same test function via in-process
    # fixture, not as a separate test.
    unit: []
    integration: []

  NFR-02:
    # NFR-02 is covered by:
    #   - cross_cutting.security::test_redteam_shell_true_absent_in_codebase
    #     (structural scan: no `shell=True` in core/taskq/)
    #   - fr_tests.FR-01.unit::test_fr01_submit_injection_chars_returns_two
    #     (parametrized over 6 chars: `;` `|` `&` `$` `>` `<` `` ` ``)
    # No additional nfr02_* tests are added to keep the inventory 1:1 (one test
    # name per requirement assertion).
    unit: []
    integration: []

  NFR-03:
    # NFR-03 is covered by:
    #   - cross_cutting.reliability::test_reliability_kill_during_write_keeps_valid_json
    #   - cross_cutting.reliability::test_reliability_concurrent_writes_do_not_corrupt
    #   - cross_cutting.security::test_redteam_secret_in_stdout_redacted_before_persist
    #   - cross_cutting.security::test_redteam_secret_in_stderr_redacted_before_persist
    # The 5 NFR-03 unit tests below decompose the redaction behaviour into
    # discrete assertions (sk-key in stdout/stderr, token= in stdout/stderr,
    # non-secret line preservation). The integration test asserts end-to-end
    # "secret never persisted to disk" across stdout and stderr surfaces.
    unit:
      - test_nfr03_redact_sk_key_in_stdout
      - test_nfr03_redact_sk_key_in_stderr
      - test_nfr03_redact_token_assignment_in_stdout
      - test_nfr03_redact_token_assignment_in_stderr
      - test_nfr03_preserves_non_secret_lines
    integration:
      - test_nfr03_secret_in_output_never_persisted_to_disk

cross_cutting:
  security:
    - test_redteam_prompt_injection_via_submit_blocked  # 6 chars each must be tested
    - test_redteam_shell_true_absent_in_codebase  # static grep/semgrep scan
    - test_redteam_secret_in_stdout_redacted_before_persist
    - test_redteam_secret_in_stderr_redacted_before_persist
  reliability:
    - test_reliability_kill_during_write_keeps_valid_json
    - test_reliability_concurrent_writes_do_not_corrupt
  performance:
    - test_kpi_p95_submit_status_under_50ms
  configuration:
    - test_config_env_keys_declared_in_env_example
    - test_config_taskq_home_default_dot_taskq
    - test_config_taskq_task_timeout_default_10
    - test_config_taskq_retry_limit_default_2
