    # --- NFR-06: Deployability — env var completeness ---
    - tc_id: TC-NFR-06-1
      name: test_nfr06_env_vars_have_defaults
      nfr_id: NFR-06
      ac_id: AC-NFR-06-1
      layer: unit
      module: [config.py]
      measurement: "unit test"
      description: "8 TASKQ_* vars read from env, with defaults"

    - tc_id: TC-NFR-06-2
      name: test_nfr06_env_example_completeness
      nfr_id: NFR-06
      ac_id: AC-NFR-06-2
      layer: static
      module: [config.py]
      measurement: "file inspection"
      description: ".env.example declares all 8, with comments"

