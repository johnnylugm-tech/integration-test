            - "successful run (exit 0) -> single attempt, no retry"
            - "done path unchanged"
          design_element: taskq.executor:execute_task + taskq.executor:retry + taskq.config:TASKQ_RETRY_LIMIT
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1 -> GATE2
          cross_ref_ac_ids: []
          cross_ref_nfrs: []
          matrix_sub_case: "Retry policy: failed/timeout → retry up to TASKQ_RETRY_LIMIT; done → no retry"

    FR-03:
      tc_count: 6
      owner_module: taskq.cli / taskq.executor
      test_file: tests/test_fr03_cli.py
