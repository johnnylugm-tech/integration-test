# TEST_INVENTORY.yaml — taskq v2.0.0
# Author: Requirements_Engineer (Agent A — Sub-Task 4/4)
# Round: 5 (B-2 review applied — HIGH severity gaps fixed)
# Date: 2026-06-26
# Source of truth: 01-requirements/SRS.md (APPROVED) + 01-requirements/TRACEABILITY_MATRIX.md (APPROVED)
# Project: taskq (local task queue CLI, Python 3.11 stdlib-only runtime)
# Convention: test function names use the form test_<scope>_<fr_id>_<slug> where
#   <scope> is one of {unit, cli, integration, benchmark, static}.
#   This matches the D4 spec-coverage evaluation harness that parses pytest names.
# Every test case (TC-*) listed below must be implemented by Phase 4 in
# tests/ and executed by Phase 5. No additional TCs are authorized.
# Canonical scope: TRACEABILITY_MATRIX.md §1 forward trace (APPROVED upstream),
# with range syntax (TC-XX-NNa..g) expanded per the mandatory 1:1 mapping rule.
# The §1 forward table expands every range-shorthand into its constituent sub-cases
# (e.g. TC-FR01-05a..g → 7 sub-cases, TC-NFR02-02a..g → 7, TC-FR03-08a..d → 4).
# §2 backward table lists the same TCs but uses range shorthand for groups of
# sub-cases, yielding 67 row-labels; expanded distinct-tc_ids = 77.
# Any tc_id not enumerated in §1 is unauthorized scope and MUST NOT be authored
# by Phase 4. The by_fr.tc_count totals in the coverage block below MUST equal
# the count of distinct tc_ids enumerated in the tests block (no arithmetic drift).

# P1 naming authority — used by validate-handoff and derive_test_cases.md to
# extract the authoritative per-FR test function names that P2 TEST_SPEC.md
# must preserve. Keys are FR IDs (SRS-canonical); values are test function
# names grouped by test category (unit / cli / integration / benchmark /
# static). Names must match the entries enumerated in the `tests:` block
# below. Coverage rule: every FR declared in SRS.md must appear here with
# at least one test name.
