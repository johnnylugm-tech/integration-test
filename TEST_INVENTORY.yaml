# TEST_INVENTORY.yaml — P1 Naming Authority
# Maps every FR to expected test function names. These are the AUTHORITATIVE names
# that derive_test_cases.md preserves in TEST_SPEC.md (P2 single source of truth).
# Specified per FR and per test category (unit/integration/cross_cutting).
# If no name is specified for a category, derive_test_cases.md fills the gap with
# names derived via the 7-Question Protocol.
format_version: "1.1"

# Real test names live in 02-architecture/TEST_SPEC.md (P2 deliverable, single
# source of truth). Leaving the per-FR / cross_cutting lists empty here lets
# P1 explicitly defer to TEST_SPEC.md instead of carrying placeholder names
# (test_fr01_example_unit, test_security_example, ...) that the derive_test_cases
# template injected and that the spec-coverage check then flagged as missing.
# This was Bug #132 (discovered 2026-06-27 while pushing P3-exit).
fr_tests: {}

cross_cutting: {}