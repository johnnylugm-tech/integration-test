      - tc_id: TC-FR03-05
        ac: AC-FR03-05
        test_file: tests/test_fr03_cli.py
        test_function: test_fr03_clear
        layer: integration
        type: cli_mutation
        asserts:
          - "'clear' → $TASKQ_HOME/tasks.json is empty (canonical verbatim)"
