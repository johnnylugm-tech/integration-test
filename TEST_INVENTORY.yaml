# TEST_INVENTORY.yaml — Per-FR test function enumeration derived 1:1 from TRACEABILITY_MATRIX.md §2 / §3 (Round 5)
# Document version: 1.5.0 | 2026-06-29
# Companion to: 01-requirements/SRS.md v1.0.0 (APPROVED) and 01-requirements/TRACEABILITY_MATRIX.md v1.5.0 (APPROVED)
# Mode: INGESTION (100% derived from approved TRACEABILITY_MATRIX.md §2 forward + §3 reverse; no new tests invented)
# Purpose: Single-source enumeration of every test case that must exist in Phase 3 per-FR TDD (or Phase 5 for verification hooks), mapped to its verifying AC ID(s), owner module, file path, and verification locus. This file is consumed by Phase 3 (implementation) and Phase 4 (testing) to drive RED -> GREEN -> IMPROVE -> GATE1 and to validate coverage before Gate 3 exit.
# Naming convention enforced: test_<frNN>_<descriptive> for Python pytest (matches harness convention per SRS §3 owner = taskq (Python); see CLAUDE.md "Language" note). Test files live under tests/ with prefix test_fr<NN>_<scope>.py or test_nfr<NN>_<scope>.py; perf hooks live under tests/bench/.
# 1:1 rule (matrix §2 forward trace): every tc_id enumerated in matrix §2 (e.g. test_fr01_001_*..test_fr03_003_*) appears as one independent entry below. No collapsing. No omission. Cross-cutting coverage (matrix §3 reverse map) is signalled via cross_ref_ac_ids / cross_ref_nfrs metadata, NEVER by deletion.

test_inventory:
  metadata:
    total_test_cases: 19
    total_ac_count: 20
    ac_count_reconciliation: "20 ACs (15 FR + 5 NFR) per TRACEABILITY_MATRIX.md §1; 19 pytest tc_ids enumerated below; the 1 non-tc_id AC is AC-NFR-03-01 (chaos test) which is a P4 verification hook distinct from the FR-01 unit test (test_fr01_005_atomic_write_survives_interrupt). Chaos test is named test_nfr03_001_atomic_write_sigkill_chaos and is a separate pytest fixture that simulates SIGKILL mid-write; it is tracked under cross_cutting_static_hooks (chaos subcategory) below."
    source: TRACEABILITY_MATRIX.md §2 forward trace + §3 reverse trace (approved 2026-06-29)
    source_approved: 2026-06-29
    naming_convention: "Python pytest — test_<frNN>_<descriptive> or test_nfr<NN>_<descriptive> (matches SRS §3 owner=taskq, Python 3.11 stdlib only)"
    test_file_convention: "tests/test_fr<NN>_<scope>.py for FR tests; tests/test_nfr<NN>_<scope>.py for NFR tests; tests/bench/test_nfr01_p95.py for NFR-01 benchmark; static scan = grep -rn \"shell=True\" src/ (not a tc_id); chaos test = tests/test_nfr03_reliability.py::test_nfr03_001_atomic_write_sigkill_chaos (P4)"
    all_status_draft_round_5: true
    notes:
      - "Every tc_id listed in matrix §2 appears as one independent entry below — no collapsing, no omissions."
      - "Tests cross-listed in §3 reverse map (e.g., test_fr01_005_atomic_write_survives_interrupt <-> AC-NFR-03-01 unit coverage) keep distinct entries; AC-NFR-03-01 has TWO distinct verification hooks: (1) unit-level coverage via test_fr01_005 (FR-01 AC-FR-01-05 owner), AND (2) P4 chaos test test_nfr03_001_atomic_write_sigkill_chaos (NFR-03 AC-NFR-03-01 owner). Both hooks are required for full AC-NFR-03-01 coverage."
      - "All tests are TBD-by-phase-3 (or P5 for perf/static hooks) per matrix §2/§4; this inventory enumerates the NAMES Phase 3/P5 must author (not implement them)."
      - "AC IDs with parametric coverage (e.g. AC-FR-01-03 'one negative per char'; AC-FR-02-02 'parametrized over 3 exit classes'; AC-FR-03-03 'parametrized over all 4 codes') are enumerated as ONE parametrized test entry each — the parametrization is the test contract; per-case data lives in pytest.mark.parametrize ids, not separate tc_ids."
      - "Static scan `grep -rn \"shell=True\" src/` for AC-NFR-02-01 is a P5 verification hook, NOT a tc_id — it is documented under NFR-02 cross_cutting section, not in by_fr.NFR-02.tests."
      - "Chaos test for AC-NFR-03-01 is a P4 verification hook that simulates SIGKILL mid-write. It is enumerated under cross_cutting_static_hooks (chaos subcategory), not under by_fr.NFR-03.tests (which contains only test_nfr03_002_secret_line_redacted). Rationale: AC-NFR-03-01 is covered jointly by the FR-01 atomic-write unit test (test_fr01_005) AND the P4 chaos fixture (test_nfr03_001_atomic_write_sigkill_chaos); neither alone satisfies AC-NFR-03-01."

  by_fr:
    FR-01:
      tc_count: 6
      owner_module: taskq.validate (AC-FR-01-01/02/03) + taskq.store (AC-FR-01-04/05/06)
      test_file: tests/test_fr01_validate.py + tests/test_fr01_store.py
      tests:
        - tc_id: test_fr01_001_empty_command_rejected
          ac_ids: [AC-FR-01-01]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_validate.py
          asserts:
            - "empty string command -> exit 2 + stderr validation error + tasks.json unchanged"
            - "whitespace-only command ('   ') -> exit 2 + same invariant"
          design_element: taskq.validate:validate_command
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []

        - tc_id: test_fr01_002_length_exceeds_1000_rejected
          ac_ids: [AC-FR-01-02]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_validate.py
          asserts:
            - "command length 1001 -> exit 2"
            - "command length exactly 1000 -> accepted (boundary, exit 0)"
            - "tasks.json unchanged on reject"
          design_element: taskq.validate:validate_command
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []

        - tc_id: test_fr01_003_injection_chars_rejected
          ac_ids: [AC-FR-01-03]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_validate.py
          asserts:
            - "all 7 injection chars ( ; | & $ > < backtick ) cause exit 2 (parametrized, one negative per char)"
            - "tasks.json unchanged on reject"
          design_element: taskq.validate:validate_command (blacklist `; | & $ > < backtick`)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [AC-NFR-02-02]
          cross_ref_nfrs: [NFR-02]

        - tc_id: test_fr01_004_pending_fields_initialized
          ac_ids: [AC-FR-01-04]
          fr: FR-01
          layer: unit
          file_path: tests/test_fr01_store.py
          asserts:
            - "generated id matches ^[0-9a-f]{8}$ (uuid4 hex prefix)"
            - "record.status == 'pending'"
            - "record has fields: id, status, command, created_at"
            - "created_at is ISO-8601 format"
          design_element: taskq.store:append_task + taskq.validate:generate_task_id
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []

        - tc_id: test_fr01_005_atomic_write_survives_interrupt
          ac_ids: [AC-FR-01-05]
          fr: FR-01
          layer: integration
          file_path: tests/test_fr01_store.py
          asserts:
            - "write path uses tmp file + os.replace (atomic rename)"
            - "concurrent reader thread polling file during write never observes partial JSON"
            - "final file parses as valid JSON"
          design_element: taskq.store:atomic_write (tmp + os.replace)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [AC-NFR-03-01]
          cross_ref_nfrs: [NFR-03]

        - tc_id: test_fr01_006_corrupt_store_exit1
          ac_ids: [AC-FR-01-06]
          fr: FR-01
          layer: integration
          file_path: tests/test_fr01_store.py
          asserts:
            - "pre-seeded invalid JSON in tasks.json -> exit 1"
            - "stderr contains literal 'store corrupted'"
            - "file content unchanged (no silent rebuild)"
          design_element: taskq.store:load_store (corruption detection)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []

    FR-02:
      tc_count: 7
      owner_module: taskq.runner (AC-FR-02-01/02/03/04/06) + taskq.cli (AC-FR-02-05)
      test_file: tests/test_fr02_runner.py + tests/test_fr02_cli.py
      tests:
        - tc_id: test_fr02_001_subprocess_form_no_shell
          ac_ids: [AC-FR-02-01]
          fr: FR-02
          layer: unit
          file_path: tests/test_fr02_runner.py
          asserts:
            - "subprocess.run called with kwargs: shlex.split(command), capture_output=True, text=True, timeout=TASKQ_TASK_TIMEOUT"
            - "no shell=True kwarg"
          design_element: taskq.runner:run_task
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [AC-NFR-02-01]
          cross_ref_nfrs: [NFR-02]

        - tc_id: test_fr02_002_state_transitions
          ac_ids: [AC-FR-02-02]
          fr: FR-02
          layer: unit
          file_path: tests/test_fr02_runner.py
          asserts:
            - "exit 0 -> status == 'done' (parametrized over 3 exit classes: done / failed / timeout)"
            - "exit non-zero -> status == 'failed'"
            - "TimeoutExpired exception -> status == 'timeout'"
            - "state transition order: pending -> running -> {done|failed|timeout}"
          design_element: taskq.runner:run_task (state machine)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []

        - tc_id: test_fr02_003_result_fields_populated
          ac_ids: [AC-FR-02-03]
          fr: FR-02
          layer: unit
          file_path: tests/test_fr02_runner.py
          asserts:
            - "result has fields: exit_code, stdout_tail, stderr_tail, duration_ms, finished_at"
            - "stdout_tail and stderr_tail truncated to last 2000 chars"
          design_element: taskq.runner:build_result
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [AC-NFR-03-02]
          cross_ref_nfrs: [NFR-03]

        - tc_id: test_fr02_004_retry_until_limit
          ac_ids: [AC-FR-02-04]
          fr: FR-02
          layer: integration
          file_path: tests/test_fr02_runner.py
          asserts:
            - "TASKQ_RETRY_LIMIT=2: failed command retried up to 2 additional times (3 total attempts)"
            - "after limit exhausted, final status reflects last attempt"
            - "parametrized over TASKQ_RETRY_LIMIT values 0/1/2/3"
          design_element: taskq.runner:run_task (retry loop up to TASKQ_RETRY_LIMIT)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []

        - tc_id: test_fr02_004b_no_retry_on_done
          ac_ids: [AC-FR-02-04]
          fr: FR-02
          layer: unit
          file_path: tests/test_fr02_runner.py
          asserts:
            - "exit 0 command (status 'done') is NOT retried (single attempt)"
            - "subprocess.run invocation count == 1"
          design_element: taskq.runner:run_task (retry loop, negative path)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []

        - tc_id: test_fr02_005_timeout_exit_code_4
          ac_ids: [AC-FR-02-05]
          fr: FR-02
          layer: integration
          file_path: tests/test_fr02_cli.py
          asserts:
            - "single-task mode `taskq run <id>` with timeout result -> process exit code == 4"
            - "non-single-task mode does NOT change behavior (regression guard)"
          design_element: taskq.cli:cmd_run (single-task mode exit-code policy)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [AC-FR-03-03]
          cross_ref_nfrs: []

        - tc_id: test_fr02_006_unexpected_exception_exit1
          ac_ids: [AC-FR-02-06]
          fr: FR-02
          layer: integration
          file_path: tests/test_fr02_runner.py
          asserts:
            - "unexpected exception (e.g. KeyboardInterrupt, OSError) -> exit 1"
            - "no bare `except:` swallowing (AST scan: every `except:` clause has an exception type or re-raises)"
          design_element: taskq.runner:run_task (unexpected exception handler)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [AC-FR-03-03]
          cross_ref_nfrs: []

    FR-03:
      tc_count: 4
      owner_module: taskq.cli (argparse dispatch + exit-code policy)
      test_file: tests/test_fr03_cli.py
      tests:
        - tc_id: test_fr03_001_subcommands_dispatch
          ac_ids: [AC-FR-03-01]
          fr: FR-03
          layer: integration
          file_path: tests/test_fr03_cli.py
          asserts:
            - "all 5 subcommands registered: submit, run, status, list, clear"
            - "`taskq submit \"cmd\"` invokes FR-01 path"
            - "`taskq run <id>` invokes FR-02 path"
            - "`taskq status <id>` prints full record for known id"
            - "`taskq list` prints one line per task"
            - "`taskq clear` empties tasks.json"
          design_element: taskq.cli:main (argparse subcommands)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []

        - tc_id: test_fr03_001b_status_unknown_id_exit2
          ac_ids: [AC-FR-03-01]
          fr: FR-03
          layer: unit
          file_path: tests/test_fr03_cli.py
          asserts:
            - "`taskq status <unknown-id>` -> exit 2"
            - "stderr contains literal 'unknown task: <id>'"
          design_element: taskq.cli:cmd_status (negative path)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [AC-FR-03-03]
          cross_ref_nfrs: []

        - tc_id: test_fr03_002_json_flag_single_line
          ac_ids: [AC-FR-03-02]
          fr: FR-03
          layer: unit
          file_path: tests/test_fr03_cli.py
          asserts:
            - "--json output has no embedded newlines (single line of JSON)"
            - "json.loads(stdout) succeeds without exception"
          design_element: taskq.cli:_print_json (global --json flag)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: []
          cross_ref_nfrs: []

        - tc_id: test_fr03_003_exit_code_matrix
          ac_ids: [AC-FR-03-03]
          fr: FR-03
          layer: integration
          file_path: tests/test_fr03_cli.py
          asserts:
            - "exit 0: successful submit + run"
            - "exit 2: validation error (parametrized over empty command, length > 1000, injection char, unknown id)"
            - "exit 4: single-task timeout"
            - "exit 1: corrupted store / unexpected exception"
          design_element: taskq.cli:main (exit-code policy)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [AC-FR-01-01, AC-FR-01-02, AC-FR-01-03, AC-FR-01-06, AC-FR-02-05, AC-FR-02-06]
          cross_ref_nfrs: []

    NFR-01:
      tc_count: 1
      owner_module: test harness (cross-cutting benchmark)
      test_file: tests/bench/test_nfr01_p95.py
      tests:
        - tc_id: perf_fr03_nfr01_p95_under_50ms
          ac_ids: [AC-NFR-01-01]
          fr: NFR-01
          layer: benchmark
          file_path: tests/bench/test_nfr01_p95.py
          asserts:
            - "100 iterations of submit+status cycle, p95 < 50ms (measured via time.perf_counter)"
            - "excludes subprocess execution time (mocked or skipped)"
          design_element: end-to-end submit+status loop (benchmark)
          verification_locus: P5 BASELINE
          cross_ref_ac_ids: [AC-FR-01-04, AC-FR-03-01]
          cross_ref_nfrs: [NFR-01]

    NFR-03:
      tc_count: 1
      owner_module: taskq.redact (or inline in taskq.store write path)
      test_file: tests/test_nfr03_reliability.py
      tests:
        - tc_id: test_nfr03_002_secret_line_redacted
          ac_ids: [AC-NFR-03-02]
          fr: NFR-03
          layer: unit
          file_path: tests/test_nfr03_reliability.py
          asserts:
            - "line containing 'sk-XXXXXXXX...' (>= 8 chars after sk-) replaced entirely with '[REDACTED]'"
            - "line containing 'token=...' replaced entirely with '[REDACTED]'"
            - "line without sk-/token= pattern passes through unchanged (non-match control)"
            - "matched line replaced with literal '[REDACTED]' (entire line, not partial substring)"
          design_element: taskq.redact:redact_line (regex `(sk-[A-Za-z0-9_-]{8,}|token=\\S+)`)
          verification_locus: TDD-RED -> TDD-GREEN -> GATE1
          cross_ref_ac_ids: [AC-FR-02-03]
          cross_ref_nfrs: [NFR-03]

  by_layer:
    unit:
      count: 11
      description: "Single-component tests with mocked dependencies (validate, runner, store-atomic, redact, cli-json)."
      tc_ids:
        - test_fr01_001_empty_command_rejected
        - test_fr01_002_length_exceeds_1000_rejected
        - test_fr01_003_injection_chars_rejected
        - test_fr01_004_pending_fields_initialized
        - test_fr02_001_subprocess_form_no_shell
        - test_fr02_002_state_transitions
        - test_fr02_003_result_fields_populated
        - test_fr02_004b_no_retry_on_done
        - test_fr03_001b_status_unknown_id_exit2
        - test_fr03_002_json_flag_single_line
        - test_nfr03_002_secret_line_redacted

    integration:
      count: 7
      description: "Cross-module or filesystem-coupled tests (cli+runner, cli+store, exit-code matrix)."
      tc_ids:
        - test_fr01_005_atomic_write_survives_interrupt
        - test_fr01_006_corrupt_store_exit1
        - test_fr02_004_retry_until_limit
        - test_fr02_005_timeout_exit_code_4
        - test_fr02_006_unexpected_exception_exit1
        - test_fr03_001_subcommands_dispatch
        - test_fr03_003_exit_code_matrix

    benchmark:
      count: 1
      description: "Performance/load benchmark tests (NFR-01 p95 latency, P5 verification hook)."
      tc_ids:
        - perf_fr03_nfr01_p95_under_50ms

  cross_cutting_static_hooks:
    description: "Static / external / chaos verification hooks that are NOT pytest tc_ids enumerated in by_fr.*. Listed here for traceability; do not count toward total_test_cases."
    hooks:
      - ac_ids: [AC-NFR-02-01]
        hook: 'grep -rn "shell=True" src/'
        phase: P5 static scan + P6 Gate 4 re-scan
        owner: @phase5-static + @phase6-quality
      - ac_ids: [AC-NFR-03-01]
        hook: "test_nfr03_001_atomic_write_sigkill_chaos (P4 chaos fixture: SIGKILL mid-write, asserts post-state parses as legal JSON)"
        tc_id_name: test_nfr03_001_atomic_write_sigkill_chaos
        phase: P4 chaos test
        owner: @phase4-test
        file_path: tests/test_nfr03_reliability.py
        distinct_from: test_fr01_005_atomic_write_survives_interrupt (FR-01 unit test; AC-FR-01-05 owner)

  coverage_validation:
    all_matrix_section_2_entries_enumerated: true
    no_collapsing: true
    no_omission: true
    cross_cutting_signalled_via_metadata_not_deletion: true
    per_fr_totals_reconcile_to_matrix_section_2:
      FR-01: 6
      FR-02: 7
      FR-03: 4
      NFR-01: 1
      NFR-03: 1
      sum: 19
    per_layer_totals_reconcile:
      unit: 11
      integration: 7
      benchmark: 1
      sum: 19
    total_test_cases_matches_per_fr_sum: true
    matrix_section_3_reverse_map_symmetric: true
    matrix_section_3_internal_arithmetic:
      matrix_claims_per_fr_section_2_table: "FR-01=6, FR-02=7, FR-03=4, NFR-01=1, NFR-03=1 (sum 19 pytest tc_ids; AC-NFR-03-01 chaos test test_nfr03_001_atomic_write_sigkill_chaos is a P4 verification hook tracked under cross_cutting_static_hooks, not in by_fr.NFR-03.tests)"
      this_inventory_matches: true
    cross_cutting_bindings_preserved:
      - "AC-FR-01-03 <-> AC-NFR-02-02: test_fr01_003_injection_chars_rejected cross_refs AC-NFR-02-02"
      - "AC-FR-02-01 <-> AC-NFR-02-01: test_fr02_001_subprocess_form_no_shell cross_refs AC-NFR-02-01"
      - "AC-FR-01-05 <-> AC-NFR-03-01: test_fr01_005_atomic_write_survives_interrupt cross_refs AC-NFR-03-01"
      - "AC-FR-02-03 <-> AC-NFR-03-02: test_fr02_003_result_fields_populated cross_refs AC-NFR-03-02"
      - "AC-FR-02-05 <-> AC-FR-03-03: test_fr02_005_timeout_exit_code_4 cross_refs AC-FR-03-03"
      - "AC-FR-02-06 <-> AC-FR-03-03: test_fr02_006_unexpected_exception_exit1 cross_refs AC-FR-03-03"
      - "AC-FR-03-01 (negative) <-> AC-FR-03-03: test_fr03_001b_status_unknown_id_exit2 cross_refs AC-FR-03-03"
      - "AC-FR-03-03 <-> multiple FR-01/02 ACs: test_fr03_003_exit_code_matrix cross_refs AC-FR-01-01/02/03/06, AC-FR-02-05/06"
      - "AC-NFR-01-01 <-> AC-FR-01-04 + AC-FR-03-01: perf_fr03_nfr01_p95_under_50ms cross_refs both"