      - test_cli_fr03_list_command_truncated_at_fifty
      - test_cli_fr03_list_format_regex_conformance
      - test_cli_fr03_list_empty_store_exit_zero
      - test_cli_fr03_clear_then_list_empty
      - test_cli_fr03_status_json_single_line
      - test_cli_fr03_list_json_single_line
