[tool:pytest]
testpaths = 03-development/tests
pythonpath = 03-development/src

[tool:coverage]
run =
    source = 03-development/src/taskq
    omit =
        */__main__.py
        __main__.py

[mutmut]
paths_to_mutate = 03-development/src/taskq
tests_dir = 03-development/tests
runner = python3 -m pytest

[mypy]
exclude = ^(tests|harness)/
