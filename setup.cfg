[tool:pytest]
testpaths = tests 03-development/tests
pythonpath = 03-development/src
# 2026-07-02 incident fix: harness is a SUBMODULE (consumer of this repo's CLI),
# not part of its own test suite. Without this exclude, a stale/missing
# testpaths entry falls back to rootdir collection and pulls harness/tests/
# into the host's pytest run — see memory harness-test-cwd-leak-2026-07-02.md.
norecursedirs = harness .venv *.egg-info build dist .git .sessi-work .methodology .harness .ruff_cache .pytest_cache

[tool:coverage]
run =
    source = 03-development/src/taskq
    omit =
        */__main__.py
        __main__.py

[mutmut]
paths_to_mutate = 03-development/src/taskq
tests_dir = 03-development/tests
runner = python3 -m pytest

[mypy]
exclude = ^(tests|harness)/
