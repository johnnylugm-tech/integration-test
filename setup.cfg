[mutmut]
paths_to_mutate = 03-development/src/taskq/
tests_dir = 03-development/tests/
runner = python -m pytest
; Harness rewrites `runner` to `{sys.executable} -m pytest` when it is
; a well-known default (Bug #41/#91). Keep this value bare so the rewrite
; applies. `tests_dir` is force-set to the absolute workdir-aware path,
; but mutmut 2.x does NOT auto-pass tests_dir to the runner — the runner
; must invoke pytest with an absolute path. We do that by running mutmut
; in the project root, not the harness's temp workdir, via the
; `cwd` arg of subprocess.run inside compute_mutation_score.
