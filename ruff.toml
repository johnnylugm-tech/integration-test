# 03-development/tests/ uses a conftest-injected sub-assertion mirror pattern
# (TEST_SPEC rows expose bare var names that resolve at runtime via
# request.module globals — see conftest.py). Static F821 is a false positive
# for this pattern, so it is ignored in tests/. The captured = capsys.readouterr()
# drain-buffer pattern is also intentional (F841); only the assignment to
# `captured` is ignored, the F401/F541 violations remain in force.
extend-exclude = ["harness", ".venv"]

[lint]
per-file-ignores = { "03-development/tests/*" = ["F821", "F841"], "tests/*" = ["F821", "F841"] }
